<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>添加短信模板</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-g am-margin-top">
            <div class="am-u-sm-8 am-u-sm-centered">
                <div class="am-panel am-panel-primary">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-plus"></i> 添加短信模板</h3>
                    </div>
                    <div class="am-panel-bd">
                        <form class="am-form am-form-horizontal" action="__SELF__" method="POST">
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">模板名称 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <input type="text" name="name" class="am-form-field" placeholder="如: 课后反馈通知" required>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">模板类型</label>
                                <div class="am-u-sm-7">
                                    <select name="type" class="am-form-field">
                                        <option value="1">通知</option>
                                        <option value="2">营销</option>
                                        <option value="3">验证码</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">模板内容 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <textarea name="content" class="am-form-field" rows="5" placeholder="可用变量: {name}, {course}, {date}, {time}" required></textarea>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">状态</label>
                                <div class="am-u-sm-7">
                                    <select name="status" class="am-form-field">
                                        <option value="1">启用</option>
                                        <option value="0">禁用</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <div class="am-u-sm-7 am-u-sm-offset-3">
                                    <button type="submit" class="am-btn am-btn-primary am-btn-block">提交</button>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <div class="am-u-sm-7 am-u-sm-offset-3">
                                    <a href="{:U('template')}" class="am-btn am-btn-default am-btn-block">返回</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
</body>
</html>
