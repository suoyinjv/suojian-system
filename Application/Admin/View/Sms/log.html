<script>
function viewDetail(id) {
    $.get('/getLog?id=' + id, function(res) {
        if (res.data) {
            alert('手机号: ' + res.data.phone + '\n内容: ' + res.data.content + '\n状态: ' + (res.data.status == 1 ? '成功' : '失败'));
        }
    });
}
</script>
