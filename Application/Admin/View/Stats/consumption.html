<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>课消数据报表 - SchoolCMS</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
    <script src="__PUBLIC__/echarts.min.js"></script>
    <style>
        .stat-card { padding: 20px; margin-bottom: 20px; border-radius: 8px; text-align: center; }
        .stat-card.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .stat-card.blue { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .stat-card.orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .stat-number { font-size: 32px; font-weight: bold; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .chart-container { height: 300px; }
    </style>
</head>
<body>
<div class="admin-content">
    <div class="am-u-sm-12">
        <h2>📚 课消数据报表</h2>
        
        <div class="am-g" style="margin-bottom: 20px;">
            <div class="am-u-sm-4">
                <div class="stat-card green">
                    <div class="stat-number">{$year_consumption}</div>
                    <div class="stat-label">年度总课消(时)</div>
                </div>
            </div>
            <div class="am-u-sm-4">
                <div class="stat-card blue">
                    <div class="stat-number">{$month_consumption|default=0}</div>
                    <div class="stat-label">本月课消(时)</div>
                </div>
            </div>
            <div class="am-u-sm-4">
                <div class="stat-card orange">
                    <div class="stat-number">{$avg_daily|default=0}</div>
                    <div class="stat-label">日均课消(时)</div>
                </div>
            </div>
        </div>
        
        <div class="am-g">
            <div class="am-u-sm-6">
                <div class="am-panel am-panel-default">
                    <div class="am-panel-hd">月度课消趋势（近12月）</div>
                    <div class="am-panel-bd">
                        <div id="trendChart" class="chart-container"></div>
                    </div>
                </div>
            </div>
            <div class="am-u-sm-6">
                <div class="am-panel am-panel-default">
                    <div class="am-panel-hd">课程课消占比</div>
                    <div class="am-panel-bd">
                        <div id="courseChart" class="chart-container"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="am-panel am-panel-default" style="margin-top: 20px;">
            <div class="am-panel-hd">近期课消记录</div>
            <div class="am-panel-bd">
                <table class="am-table am-table-bordered am-table-striped">
                    <thead>
                        <tr><th>学员</th><th>课程</th><th>课时</th><th>类型</th><th>时间</th></tr>
                    </thead>
                    <tbody>
                        <volist name="recentList" id="vo">
                        <tr>
                            <td>{$vo.student_name}</td>
                            <td>{$vo.course_name}</td>
                            <td>{$vo.hours}</td>
                            <td>{$vo.type_text}</td>
                            <td>{:date('Y-m-d H:i', $vo['add_time'])}</td>
                        </tr>
                        </volist>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
var monthTrend = {$month_trend|default='[]'};
var courseData = {$course_data|default='[]'};

if (monthTrend.length) {
    var trendChart = echarts.init(document.getElementById('trendChart'));
    trendChart.setOption({
        xAxis: { type: 'category', data: monthTrend.map(function(d){return d.month;}) },
        yAxis: { type: 'value' },
        series: [{ type: 'line', data: monthTrend.map(function(d){return d.hours;}), smooth: true, areaStyle: {color: 'rgba(17, 153, 142, 0.2)'}, itemStyle: {color: '#11998e'} }]
    });
}

if (courseData.length) {
    var courseChart = echarts.init(document.getElementById('courseChart'));
    courseChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c}时 ({d}%)' },
        series: [{ type: 'pie', radius: ['35%', '65%'], data: courseData }]
    });
}
</script>
</body>
</html>
