<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>学员数据报表 - SchoolCMS</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
    <script src="__PUBLIC__/echarts.min.js"></script>
    <style>
        .stat-card { padding: 20px; margin-bottom: 20px; border-radius: 8px; text-align: center; }
        .stat-card.blue { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .stat-card.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .stat-card.orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .stat-number { font-size: 32px; font-weight: bold; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .chart-container { height: 280px; }
    </style>
</head>
<body>
<div class="admin-content">
    <div class="am-u-sm-12">
        <h2>👨‍🎓 学员数据报表</h2>
        
        <div class="am-g" style="margin-bottom: 20px;">
            <div class="am-u-sm-4">
                <div class="stat-card blue">
                    <div class="stat-number">{$total_students}</div>
                    <div class="stat-label">学员总数</div>
                </div>
            </div>
            <div class="am-u-sm-4">
                <div class="stat-card green">
                    <div class="stat-number">{$year_new_students}</div>
                    <div class="stat-label">本年新增</div>
                </div>
            </div>
            <div class="am-u-sm-4">
                <div class="stat-card orange">
                    <div class="stat-number">{$active_students|default=0}</div>
                    <div class="stat-label">活跃学员</div>
                </div>
            </div>
        </div>
        
        <div class="am-g">
            <div class="am-u-sm-6">
                <div class="am-panel am-panel-default">
                    <div class="am-panel-hd">每月新增学员（近12月）</div>
                    <div class="am-panel-bd">
                        <div id="trendChart" class="chart-container"></div>
                    </div>
                </div>
            </div>
            <div class="am-u-sm-6">
                <div class="am-panel am-panel-default">
                    <div class="am-panel-hd">学员来源分布</div>
                    <div class="am-panel-bd">
                        <div id="sourceChart" class="chart-container"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="am-panel am-panel-default" style="margin-top: 20px;">
            <div class="am-panel-hd">课消排名前20学员</div>
            <div class="am-panel-bd">
                <table class="am-table am-table-bordered am-table-striped">
                    <thead>
                        <tr><th>排名</th><th>学员</th><th>总课消(时)</th><th>操作</th></tr>
                    </thead>
                    <tbody>
                        <volist name="consumptionRank" id="vo">
                        <tr>
                            <td>{$i}</td>
                            <td>{$vo.student_name}</td>
                            <td>{$vo.total_hours}</td>
                            <td><a href="{:U('Student/index')}?keyword={$vo.student_name}">查看详情</a></td>
                        </tr>
                        </volist>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
var monthTrend = {$month_trend|default='[]'};
var sourceData = {$source_data|default='[]'};

if (monthTrend.length) {
    var trendChart = echarts.init(document.getElementById('trendChart'));
    trendChart.setOption({
        xAxis: { type: 'category', data: monthTrend.map(function(d){return d.month;}) },
        yAxis: { type: 'value' },
        series: [{ type: 'bar', data: monthTrend.map(function(d){return d.count;}), itemStyle: { color: '#667eea' } }]
    });
}

if (sourceData.length) {
    var sourceChart = echarts.init(document.getElementById('sourceChart'));
    sourceChart.setOption({
        tooltip: { trigger: 'item' },
        series: [{ type: 'pie', radius: ['35%', '65%'], data: sourceData }]
    });
}
</script>
</body>
</html>
