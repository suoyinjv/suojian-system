<include file="Public/Header" />

<!-- right content start -->
<div class="content-right">
    <div class="content">
        <!-- form start -->
        <form class="am-form am-form-horizontal" action="{{:U('Admin/Leads/save')}}" method="POST">
            <input type="hidden" name="id" value="{{$leads.id|default=''}}" />
            
            <div class="am-form-group">
                <label class="am-u-sm-2 am-form-label">姓名 <span class="required">*</span></label>
                <div class="am-u-sm-4">
                    <input type="text" name="name" class="am-radius" placeholder="请输入姓名" value="{{$leads.name|default=''}}" required />
                </div>
            </div>
            
            <div class="am-form-group">
                <label class="am-u-sm-2 am-form-label">手机号 <span class="required">*</span></label>
                <div class="am-u-sm-4">
                    <input type="text" name="phone" class="am-radius" placeholder="请输入手机号" value="{{$leads.phone|default=''}}" required />
                </div>
            </div>
            
            <div class="am-form-group">
                <label class="am-u-sm-2 am-form-label">微信</label>
                <div class="am-u-sm-4">
                    <input type="text" name="wechat" class="am-radius" placeholder="请输入微信号" value="{{$leads.wechat|default=''}}" />
                </div>
            </div>
            
            <div class="am-form-group">
                <label class="am-u-sm-2 am-form-label">意向程度 <span class="required">*</span></label>
                <div class="am-u-sm-4">
                    <select name="intention_level" class="am-radius" required>
                        <option value="">请选择意向程度</option>
                        <option value="1" {{$leads.intention_level|default=''|eq='1'?'selected':''}}>低</option>
                        <option value="2" {{$leads.intention_level|default=''|eq='2'?'selected':''}}>中</option>
                        <option value="3" {{$leads.intention_level|default=''|eq='3'?'selected':''}}>高</option>
                    </select>
                </div>
            </div>
            
            <div class="am-form-group">
                <label class="am-u-sm-2 am-form-label">意向课程</label>
                <div class="am-u-sm-4">
                    <select name="course_id" class="am-radius">
                        <option value="">请选择课程</option>
                        <volist name="course_list" id="vo">
                            <option value="{{$vo.id}}" {{$leads.course_id|default=''|eq=$vo['id']?'selected':''}}>{{$vo.name}}</option>
                        </volist>
                    </select>
                </div>
            </div>
            
            <div class="am-form-group">
                <label class="am-u-sm-2 am-form-label">来源渠道 <span class="required">*</span></label>
                <div class="am-u-sm-4">
                    <select name="source" class="am-radius" required>
                        <option value="">请选择来源渠道</option>
                        <option value="线上推广" {{$leads.source|default=''|eq='线上推广'?'selected':''}}>线上推广</option>
                        <option value="地推" {{$leads.source|default=''|eq='地推'?'selected':''}}>地推</option>
                        <option value="转介绍" {{$leads.source|default=''|eq='转介绍'?'selected':''}}>转介绍</option>
                        <option value="电话咨询" {{$leads.source|default=''|eq='电话咨询'?'selected':''}}>电话咨询</option>
                        <option value="上门咨询" {{$leads.source|default=''|eq='上门咨询'?'selected':''}}>上门咨询</option>
                        <option value="其他" {{$leads.source|default=''|eq='其他'?'selected':''}}>其他</option>
                    </select>
                </div>
            </div>
            
            <div class="am-form-group">
                <label class="am-u-sm-2 am-form-label">跟进状态</label>
                <div class="am-u-sm-4">
                    <select name="status" class="am-radius">
                        <option value="1" {{$leads.status|default='1'|eq='1'?'selected':''}}>新线索</option>
                        <option value="2" {{$leads.status|default=''|eq='2'?'selected':''}}>已跟进</option>
                        <option value="3" {{$leads.status|default=''|eq='3'?'selected':''}}>已转化</option>
                        <option value="4" {{$leads.status|default=''|eq='4'?'selected':''}}>已流失</option>
                    </select>
                </div>
            </div>
            
            <div class="am-form-group">
                <label class="am-u-sm-2 am-form-label">备注</label>
                <div class="am-u-sm-6">
                    <textarea name="remark" class="am-radius" rows="4" placeholder="请输入备注信息">{{$leads.remark|default=''}}</textarea>
                </div>
            </div>
            
            <div class="am-form-group">
                <div class="am-u-sm-6 am-u-sm-offset-2">
                    <button type="submit" class="am-btn am-btn-primary am-radius">保存</button>
                    <a href="{{:U('Admin/Leads/index')}}" class="am-btn am-btn-default am-radius">取消</a>
                </div>
            </div>
        </form>
        <!-- form end -->
    </div>
</div>
<!-- right content end -->

<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->
