<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>分配作业 - SchoolCMS</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="admin-content">
    <div class="am-u-sm-10 am-u-sm-centered">
        <div class="am-panel am-panel-default">
            <div class="am-panel-hd"><i class="am-icon-share"></i> 分配作业给学员</div>
            <div class="am-panel-bd">
                <form class="am-form am-form-horizontal" action="{:U('assign')}" method="POST">
                    <div class="am-form-group">
                        <label class="am-u-sm-2">作业</label>
                        <div class="am-u-sm-10">
                            <select name="homework_id" class="am-form-field" required>
                                <option value="">选择作业</option>
                                <volist name="homeworkList" id="vo">
                                <option value="{$vo.id}">{$vo.title}（{$vo.class_name}）</option>
                                </volist>
                            </select>
                        </div>
                    </div>
                    
                    <div class="am-form-group">
                        <label class="am-u-sm-2">分配方式</label>
                        <div class="am-u-sm-10">
                            <label class="am-radio-inline">
                                <input type="radio" name="assign_type" value="class" checked onchange="toggleAssignType('class')"> 按班级分配
                            </label>
                            <label class="am-radio-inline">
                                <input type="radio" name="assign_type" value="student" onchange="toggleAssignType('student')"> 按学员分配
                            </label>
                        </div>
                    </div>
                    
                    <div class="am-form-group" id="classSection">
                        <label class="am-u-sm-2">选择班级</label>
                        <div class="am-u-sm-10">
                            <select name="class_id" class="am-form-field">
                                <option value="">全部班级</option>
                                <volist name="classList" id="vo">
                                <option value="{$vo.id}">{$vo.class_name}</option>
                                </volist>
                            </select>
                        </div>
                    </div>
                    
                    <div class="am-form-group" id="studentSection" style="display:none;">
                        <label class="am-u-sm-2">选择学员</label>
                        <div class="am-u-sm-10">
                            <select name="student_ids" class="am-form-field" multiple data-am-selected="{searchBox: 1, maxHeight: 300}">
                                <volist name="studentList" id="vo">
                                <option value="{$vo.id}">{$vo.student_name}（{$vo.class_name}）</option>
                                </volist>
                            </select>
                            <span class="am-form-caret">按住 Ctrl 多选</span>
                        </div>
                    </div>
                    
                    <div class="am-form-group">
                        <label class="am-u-sm-2">截止日期</label>
                        <div class="am-u-sm-4">
                            <input type="date" name="deadline" class="am-form-field" value="{:date('Y-m-d', strtotime('+7 days'))}">
                        </div>
                        <label class="am-u-sm-2">通知方式</label>
                        <div class="am-u-sm-4">
                            <label class="am-checkbox">
                                <input type="checkbox" name="notify_sms" value="1"> 短信通知
                            </label>
                            <label class="am-checkbox">
                                <input type="checkbox" name="notify_wechat" value="1" checked> 微信通知
                            </label>
                        </div>
                    </div>
                    
                    <div class="am-form-group">
                        <div class="am-u-sm-10 am-u-sm-offset-2">
                            <button type="submit" class="am-btn am-btn-primary">确认分配</button>
                            <a href="{:U('index')}" class="am-btn am-btn-default">返回</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
function toggleAssignType(type) {
    if(type == 'class') {
        $('#classSection').show();
        $('#studentSection').hide();
    } else {
        $('#classSection').hide();
        $('#studentSection').show();
    }
}
</script>
</body>
</html>
