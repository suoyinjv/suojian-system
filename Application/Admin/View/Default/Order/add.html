<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>创建订单</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-g am-margin-top">
            <div class="am-u-sm-8 am-u-sm-centered">
                <div class="am-panel am-panel-primary">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-plus"></i> 创建订单</h3>
                    </div>
                    <div class="am-panel-bd">
                        <form class="am-form am-form-horizontal" id="orderForm">
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">学员 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <select name="student_id" class="am-form-field" id="studentSelect" required>
                                        <option value="">请选择学员</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">课程 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <select name="course_id" class="am-form-field" id="courseSelect" required>
                                        <option value="">请先选择学员</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">购买课时 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <input type="number" name="total_hours" class="am-form-field" placeholder="购买课时数量" required id="totalHours">
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">单价</label>
                                <div class="am-u-sm-7">
                                    <input type="number" name="price" step="0.01" class="am-form-field" placeholder="单价" id="price" value="100">
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">订单金额 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <input type="number" name="total_amount" step="0.01" class="am-form-field" placeholder="订单总金额" required id="totalAmount">
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">备注</label>
                                <div class="am-u-sm-7">
                                    <textarea name="remark" class="am-form-field" rows="3" placeholder="订单备注"></textarea>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <div class="am-u-sm-7 am-u-sm-offset-3">
                                    <button type="submit" class="am-btn am-btn-primary am-btn-block">
                                        <i class="am-icon-check"></i> 创建订单
                                    </button>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <div class="am-u-sm-7 am-u-sm-offset-3">
                                    <a href="{:U('index')}" class="am-btn am-btn-default am-btn-block">返回列表</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/static/js/jquery-2.0.0.min.js"></script>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
$(function() {
    loadStudents();
    
    $('#studentSelect').change(function() {
        var studentId = $(this).val();
        if (studentId) {
            loadCourses(studentId);
        }
    });
    
    $('#totalHours, #price').change(function() {
        calculateTotal();
    });
    
    $('#totalAmount').change(function() {
        var total = $(this).val();
        var hours = $('#totalHours').val();
        if (total && hours && hours > 0) {
            $('#price').val((total / hours).toFixed(2));
        }
    });
});

function loadStudents() {
    $.get('/index.php?m=Admin&c=Student&a=lists&json=1', function(res) {
        var html = '<option value="">请选择学员</option>';
        if (res.data) {
            $.each(res.data, function(i, v) {
                html += '<option value="' + v.id + '">' + v.name + ' (' + v.phone + ')</option>';
            });
        }
        $('#studentSelect').html(html);
    });
}

function loadCourses(studentId) {
    $.get('/index.php?m=Admin&c=Course&a=lists&student_id=' + studentId + '&json=1', function(res) {
        var html = '<option value="">请选择课程</option>';
        if (res.data) {
            $.each(res.data, function(i, v) {
                html += '<option value="' + v.id + '">' + v.name + ' (单价:' + v.price + '元/课时)</option>';
            });
        }
        $('#courseSelect').html(html);
    });
}

function calculateTotal() {
    var hours = parseFloat($('#totalHours').val()) || 0;
    var price = parseFloat($('#price').val()) || 0;
    $('#totalAmount').val((hours * price).toFixed(2));
}

$('#orderForm').submit(function() {
    var formData = $(this).serialize();
    $.post('__SELF__', formData, function(res) {
        alert(res.msg);
        if (res.code) {
            location.href = '__CONTROLLER__/index';
        }
    });
    return false;
});
</script>
</body>
</html>
