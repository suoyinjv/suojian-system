<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>添加排课</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-g am-margin-top">
            <div class="am-u-sm-8 am-u-sm-centered">
                <div class="am-panel am-panel-primary">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-plus"></i> 添加排课</h3>
                    </div>
                    <div class="am-panel-bd">
                        <form class="am-form am-form-horizontal" action="__SELF__" method="POST">
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">课程 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <select name="course_id" class="am-form-field" required>
                                        <option value="">请选择课程</option>
                                        <volist name="courses" id="vo">
                                        <option value="{$vo.id}">{$vo.name}</option>
                                        </volist>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">班级 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <select name="class_id" class="am-form-field" required>
                                        <option value="">请选择班级</option>
                                        <volist name="classes" id="vo">
                                        <option value="{$vo.id}">{$vo.name}</option>
                                        </volist>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">老师 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <select name="teacher_id" class="am-form-field" required>
                                        <option value="">请选择老师</option>
                                        <volist name="teachers" id="vo">
                                        <option value="{$vo.id}">{$vo.name}</option>
                                        </volist>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">上课日期 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <input type="date" name="schedule_date" class="am-form-field" required value="{:date('Y-m-d')}">
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">开始时间 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <input type="time" name="start_time" class="am-form-field" required value="09:00">
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">结束时间 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-7">
                                    <input type="time" name="end_time" class="am-form-field" required value="10:00">
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">教室</label>
                                <div class="am-u-sm-7">
                                    <select name="room_id" class="am-form-field">
                                        <option value="">请选择教室</option>
                                        <volist name="rooms" id="vo">
                                        <option value="{$vo.id}">{$vo.name}</option>
                                        </volist>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">备注</label>
                                <div class="am-u-sm-7">
                                    <textarea name="remark" class="am-form-field" rows="2"></textarea>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <div class="am-u-sm-7 am-u-sm-offset-3">
                                    <button type="submit" class="am-btn am-btn-primary am-btn-block">提交</button>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <div class="am-u-sm-7 am-u-sm-offset-3">
                                    <a href="{:U('index')}" class="am-btn am-btn-default am-btn-block">返回</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
</body>
</html>
