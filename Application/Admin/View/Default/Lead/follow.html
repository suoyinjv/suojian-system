<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>跟进记录</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-g am-margin-top">
            <div class="am-u-sm-12">
                <!-- 线索信息 -->
                <div class="am-panel am-panel-primary">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-user"></i> 线索信息</h3>
                    </div>
                    <div class="am-panel-bd">
                        <div class="am-g">
                            <div class="am-u-sm-3">
                                <p><strong>姓名：</strong>{$info.student_name}</p>
                            </div>
                            <div class="am-u-sm-3">
                                <p><strong>电话：</strong>{$info.phone}</p>
                            </div>
                            <div class="am-u-sm-3">
                                <p><strong>来源：</strong>{$info.source_text}</p>
                            </div>
                            <div class="am-u-sm-3">
                                <p><strong>状态：</strong>{$info.status_text}</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 添加跟进 -->
                <div class="am-panel am-panel-success">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-edit"></i> 添加跟进记录</h3>
                    </div>
                    <div class="am-panel-bd">
                        <form class="am-form am-form-horizontal" id="followForm">
                            <input type="hidden" name="leads_id" value="{$info.id}">
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-2 am-text-right">跟进内容 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-8">
                                    <textarea name="content" class="am-form-field" rows="4" placeholder="请输入跟进内容" required></textarea>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-2 am-text-right">下次跟进时间</label>
                                <div class="am-u-sm-4">
                                    <input type="datetime-local" name="next_time" class="am-form-field">
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-2 am-text-right">意向程度</label>
                                <div class="am-u-sm-4">
                                    <select name="interest_level" class="am-form-field">
                                        <option value="">保持不变</option>
                                        <option value="1">低</option>
                                        <option value="2">中</option>
                                        <option value="3">高</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-2 am-text-right">状态更新</label>
                                <div class="am-u-sm-4">
                                    <select name="status" class="am-form-field">
                                        <option value="">保持不变</option>
                                        <option value="1">新线索</option>
                                        <option value="2">已跟进</option>
                                        <option value="3">已转化</option>
                                        <option value="4">已流失</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <div class="am-u-sm-8 am-u-sm-offset-2">
                                    <button type="submit" class="am-btn am-btn-primary">
                                        <i class="am-icon-check"></i> 提交跟进
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- 历史跟进记录 -->
                <div class="am-panel am-panel-warning">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-history"></i> 历史跟进记录</h3>
                    </div>
                    <div class="am-panel-bd">
                        <notempty name="logs">
                        <div class="am-timeline">
                            <volist name="logs" id="log">
                            <div class="am-timeline-item">
                                <div class="am-timeline-indicator">
                                    <i class="am-icon-circle-o"></i>
                                </div>
                                <div class="am-timeline-content">
                                    <div class="am-timeline-title">
                                        <span class="am-badge am-badge-primary">{$log.create_time|date='Y-m-d H:i',###}</span>
                                    </div>
                                    <div class="am-timeline-body">
                                        <p>{$log.content}</p>
                                        <notempty name="log.next_time">
                                        <p class="am-text-warning">下次跟进: {$log.next_time|date='Y-m-d H:i',###}</p>
                                        </notempty>
                                    </div>
                                </div>
                            </div>
                            </volist>
                        </div>
                        <else/>
                        <p class="am-text-center am-text-muted">暂无跟进记录</p>
                        </notempty>
                    </div>
                </div>
                
                <div class="am-text-center am-margin-top">
                    <a href="{:U('index')}" class="am-btn am-btn-default">
                        <i class="am-icon-arrow-left"></i> 返回列表
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/static/js/jquery-2.0.0.min.js"></script>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
$('#followForm').submit(function() {
    var formData = $(this).serialize();
    $.post('__SELF__', formData, function(res) {
        alert(res.msg);
        if(res.code) {
            location.reload();
        }
    });
    return false;
});
</script>
</body>
</html>
