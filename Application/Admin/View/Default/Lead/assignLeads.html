<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>分配线索</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-g am-margin-top">
            <div class="am-u-sm-6 am-u-sm-centered">
                <div class="am-panel am-panel-primary">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-share"></i> 分配线索</h3>
                    </div>
                    <div class="am-panel-bd">
                        <div class="am-alert am-alert-warning" data-am-alert>
                            <i class="am-icon-info-circle"></i> 请在列表页勾选要分配的线索，然后在此页面选择分配对象
                        </div>
                        
                        <form class="am-form am-form-horizontal" id="assignForm">
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">已选线索ID</label>
                                <div class="am-u-sm-8">
                                    <input type="text" name="ids" id="ids" class="am-form-field" placeholder="在列表页勾选后自动填入" value="{:I('ids')}" required>
                                    <span class="am-text-sm am-text-muted">多个ID用逗号分隔</span>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <label class="am-u-sm-3 am-text-right">分配给 <span class="am-text-danger">*</span></label>
                                <div class="am-u-sm-8">
                                    <select name="assigned_to" class="am-form-field" required>
                                        <option value="">请选择</option>
                                        <volist name="admins" id="vo">
                                        <option value="{$vo.id}">{$vo.name}</option>
                                        </volist>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <div class="am-u-sm-8 am-u-sm-offset-3">
                                    <button type="submit" class="am-btn am-btn-primary am-btn-block">
                                        <i class="am-icon-check"></i> 确认分配
                                    </button>
                                </div>
                            </div>
                            
                            <div class="am-form-group">
                                <div class="am-u-sm-8 am-u-sm-offset-3">
                                    <a href="{:U('index')}" class="am-btn am-btn-default am-btn-block">返回列表</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/static/js/jquery-2.0.0.min.js"></script>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
$('#assignForm').submit(function() {
    var formData = $(this).serialize();
    $.post('__SELF__', formData, function(res) {
        alert(res.msg);
        if(res.code) {
            location.href = '__CONTROLLER__/index';
        }
    });
    return false;
});
</script>
</body>
</html>
