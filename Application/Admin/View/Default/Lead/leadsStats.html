<script>
$(function() {
    loadStats();
});

function loadStats() {
    var params = $('#statsForm').serialize();
    $.get('__CONTROLLER__/leadsStats?' + params + '&json=1', function(res) {
        if (res.code && res.data) {
            var data = res.data;
            $('#totalCount').text(data.total);
            $('#convertedCount').text(data.converted);
            $('#conversionRate').text(data.conversion_rate + '%');
            
            // 计算待跟进
            var pending = 0;
            var statusMap = {};
            if (data.status_stats) {
                $.each(data.status_stats, function(i, v) {
                    statusMap[v.status] = v.cnt;
                    if (v.status == 1) pending = v.cnt;
                });
            }
            $('#pendingCount').text(pending);
            
            // 状态分布
            var statusHtml = '';
            var statusNames = {1: '新线索', 2: '已跟进', 3: '已转化', 4: '已流失'};
            var statusColors = {1: 'primary', 2: 'success', 3: 'warning', 4: 'danger'};
            if (data.status_stats) {
                $.each(data.status_stats, function(i, v) {
                    var rate = data.total > 0 ? Math.round(v.cnt / data.total * 100) : 0;
                    statusHtml += '<p>' + statusNames[v.status] + ': <span class="am-badge am-badge-' + statusColors[v.status] + '">' + v.cnt + '</span> (' + rate + '%)</p>';
                });
            }
            $('#statusChart').html(statusHtml || '<p class="text-muted">暂无数据</p>');
            
            // 来源分布
            var sourceHtml = '';
            var sourceNames = {website: '网站', offline: '地推', viral: '裂变', tel: '电话', referral: '转介绍'};
            if (data.source_stats) {
                $.each(data.source_stats, function(i, v) {
                    sourceHtml += '<p>' + sourceNames[v.source] + ': <span class="am-badge am-badge-primary">' + v.cnt + '</span></p>';
                });
            }
            $('#sourceChart').html(sourceHtml || '<p class="text-muted">暂无数据</p>');
            
            // 顾问排名
            var advisorHtml = '';
            if (data.advisor_stats && data.advisor_stats.length > 0) {
                $.each(data.advisor_stats, function(i, v) {
                    var rate = v.total > 0 ? Math.round(v.converted / v.total * 100) : 0;
                    advisorHtml += '<tr>';
                    advisorHtml += '<td>' + (i + 1) + '</td>';
                    advisorHtml += '<td>' + (v.assigned_name || '-') + '</td>';
                    advisorHtml += '<td>' + v.total + '</td>';
                    advisorHtml += '<td>' + v.converted + '</td>';
                    advisorHtml += '<td>' + rate + '%</td>';
                    advisorHtml += '</tr>';
                });
            } else {
                advisorHtml = '<tr><td colspan="5" class="text-center">暂无数据</td></tr>';
            }
            $('#advisorTable').html(advisorHtml);
        }
    });
}
</script>
