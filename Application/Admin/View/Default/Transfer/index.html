<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>转校申请管理 - SchoolCMS</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
    <link rel="stylesheet" href="__PUBLIC__/font-awesome-4.4.0/css/font-awesome.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-g am-margin-top am-padding-top-sm">
            <div class="am-u-sm-12">
                <div class="am-btn-toolbar am-fr">
                    <a href="__CONTROLLER__/transfer" class="am-btn am-btn-primary am-radius">
                        <i class="am-icon-plus"></i> 发起转校
                    </a>
                    <a href="__CONTROLLER__/getHistory" class="am-btn am-btn-success am-radius">
                        <i class="am-icon-history"></i> 转校历史
                    </a>
                </div>
                <h2 class="am-text-xl"><i class="am-icon-exchange"></i> 转校申请列表</h2>
                <hr>
            </div>
            <div class="am-u-sm-12">
                <form method="get" class="am-form-inline am-margin-bottom">
                    <div class="am-form-group">
                        <input type="text" name="keyword" class="am-form-field" placeholder="学员姓名/学号" value="{:I('keyword')}">
                    </div>
                    <div class="am-form-group">
                        <select name="status" class="am-form-field">
                            <option value="">全部状态</option>
                            <option value="0" <if condition="I('status') == '0'">selected</if>>待审核</option>
                            <option value="1" <if condition="I('status') == '1'">selected</if>>已通过</option>
                            <option value="2" <if condition="I('status') == '2'">selected</if>>已拒绝</option>
                            <option value="3" <if condition="I('status') == '3'">selected</if>>已取消</option>
                        </select>
                    </div>
                    <button type="submit" class="am-btn am-btn-default"><i class="am-icon-search"></i> 搜索</button>
                </form>
            </div>
            <div class="am-u-sm-12">
                <table class="am-table am-table-bordered am-table-striped am-table-hover">
                    <thead>
                        <tr>
                            <th class="am-text-center">ID</th>
                            <th>学员姓名</th>
                            <th>原校区</th>
                            <th>目标校区</th>
                            <th>申请时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <volist name="list" id="vo">
                        <tr>
                            <td class="am-text-center">{$vo.id}</td>
                            <td>{$vo.student_name}</td>
                            <td>{$vo.from_campus}</td>
                            <td>{$vo.to_campus}</td>
                            <td>{$vo.create_time|date='Y-m-d H:i',###}</td>
                            <td>
                                <if condition="$vo['status'] == 0">
                                    <span class="am-badge am-badge-warning">待审核</span>
                                <elseif condition="$vo['status'] == 1"/>
                                    <span class="am-badge am-badge-success">已通过</span>
                                <elseif condition="$vo['status'] == 2"/>
                                    <span class="am-badge am-badge-danger">已拒绝</span>
                                <elseif condition="$vo['status'] == 3"/>
                                    <span class="am-badge am-badge-default">已取消</span>
                                </if>
                            </td>
                            <td>
                                <a href="__CONTROLLER__/add/id/{$vo.id}" class="am-btn am-btn-xs am-btn-primary am-radius"><i class="am-icon-eye"></i> 查看</a>
                                <if condition="$vo['status'] == 0">
                                    <a href="javascript:;" onclick="cancelConfirm('__CONTROLLER__/cancel/id/{$vo.id}')" class="am-btn am-btn-xs am-btn-warning am-radius"><i class="am-icon-close"></i> 取消</a>
                                </if>
                            </td>
                        </tr>
                        </volist>
                        <notpresent name="list">
                        <tr>
                            <td colspan="7" class="am-text-center am-text-danger">暂无转校申请</td>
                        </tr>
                        </notpresent>
                    </tbody>
                </table>
                {$page}
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
function cancelConfirm(url) {
    if(confirm('确定要取消此转校申请吗？')) {
        location.href = url;
    }
}
</script>
</body>
</html>
