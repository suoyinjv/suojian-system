<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>优惠券发放记录</title>
    <link rel="stylesheet" href="/Public/css/bootstrap.min.css">
    <link rel="stylesheet" href="/Public/css/admin.css">
</head>
<body>
<div class="panel panel-info">
    <div class="panel-heading">
        <h3 class="panel-title">
            优惠券发放记录
            <a href="<?php echo U('index'); ?>" class="btn btn-xs btn-default pull-right">返回优惠券列表</a>
        </h3>
    </div>
    <div class="panel-body">
        <form method="get" class="form-inline">
            <div class="form-group">
                <select name="coupon_id" class="form-control">
                    <option value="">全部优惠券</option>
                    <?php foreach($$couponList as $$vo): ?>
                    <option value="<?php echo $vo['id']; ?>" <?php if(I('coupon_id') == $vo['id']): ?>selected<?php endif; ?>><?php echo $vo['name']; ?></option>
                    <?php endforeach; ?>
                </select>
            </div>
            <div class="form-group">
                <select name="status" class="form-control">
                    <option value="-1" <?php if(I('status') == -1): ?>selected<?php endif; ?>>全部状态</option>
                    <option value="0" <?php if(I('status') == 0): ?>selected<?php endif; ?>>未使用</option>
                    <option value="1" <?php if(I('status') == 1): ?>selected<?php endif; ?>>已使用</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">筛选</button>
            <a href="<?php echo U('sendLog'); ?>" class="btn btn-default">重置</a>
        </form>
        
        <table class="table table-bordered table-hover am-margin-top">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>优惠券</th>
                    <th>学员</th>
                    <th>领取时间</th>
                    <th>状态</th>
                    <th>使用时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <?php foreach($$list as $$item): ?>
                <tr>
                    <td><?php echo $item['id']; ?></td>
                    <td>
                        <span class="label label-primary"><?php echo $item['coupon_name']; ?></span>
                    </td>
                    <td><?php echo $item['student_name']; ?></td>
                    <td>{$item.create_time|date='Y-m-d H:i',###}</td>
                    <td>
                        <?php if($item['status'] == 0): ?>
                            <span class="label label-warning">未使用</span>
                        <?php elseif($item['status'] == 1): ?>
                            <span class="label label-success">已使用</span>
                        <else/>
                            <span class="label label-default">已过期</span>
                        <?php endif; ?>
                    </td>
                    <td>
                        <?php if($item['use_time']): ?>
                            {$item.use_time|date='Y-m-d H:i',###}
                        <else/>
                            -
                        <?php endif; ?>
                    </td>
                    <td>
                        <?php if($item['status'] == 0): ?>
                            <a href="<?php echo U('useCoupon?id='.$item['id']); ?>" class="btn btn-xs btn-success" onclick="return confirm('确认使用该优惠券?')">使用</a>
                        <?php endif; ?>
                    </td>
                </tr>
                <?php endforeach; ?>
                <?php if(!isset($$list)): ?>
                <tr>
                    <td colspan="7" class="text-center">暂无记录</td>
                </tr>
                <?php endif; ?>
            </tbody>
        </table>
        
        <?php echo $page; ?>
    </div>
</div>
</body>
</html>
