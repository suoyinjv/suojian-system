<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- form start -->
		<form class="am-form view-list" action="{{:U('Admin/Live/Resource')}}" method="POST">
			<div class="am-g">
				<select name="course_id" class="am-radius c-p">
					<option value="">全部课程</option>
					<foreach name="course_list" item="v">
						<option value="{{$v.id}}" <if condition="isset($param['course_id']) and $param['course_id'] eq $v['id']">selected</if>>{{$v.name}}</option>
					</foreach>
				</select>
				<select name="teacher_id" class="am-radius c-p m-l-5">
					<option value="">全部教师</option>
					<foreach name="teacher_list" item="v">
						<option value="{{$v.id}}" <if condition="isset($param['teacher_id']) and $param['teacher_id'] eq $v['id']">selected</if>>{{$v.name}}</option>
					</foreach>
				</select>
				<button type="submit" class="am-btn am-btn-secondary am-btn-sm am-radius form-submit">搜索</button>
			</div>
		</form>
		<!-- form end -->

		<!-- operation start -->
		<div class="am-g m-t-15">
			<a href="{{:U('Admin/Live/UploadResource')}}" class="am-btn am-btn-secondary am-radius am-btn-xs am-icon-upload"> 上传资源</a>
		</div>
		<!-- operation end -->

		<!-- list start -->
		<table class="am-table am-table-striped am-table-hover am-text-middle m-t-10">
			<thead>
				<tr>
					<th>ID</th>
					<th>文件名</th>
					<th>类型</th>
					<th>大小</th>
					<th>关联课程</th>
					<th>上传者</th>
					<th>上传时间</th>
					<th>{{:L('common_operation_name')}}</th>
				</tr>
			</thead>
			<tbody>
				<if condition="!empty($list)">
					<foreach name="list" item="v">
						<tr id="data-list-{{$v.id}}">
							<td>{{$v.id}}</td>
							<td>
								<i class="am-icon-file-{{$v.file_type}}"></i> {{$v.file_name}}
							</td>
							<td>{{$v.file_type}}</td>
							<td>{{$v.file_size}}</td>
							<td>{{$v.course_name}}</td>
							<td>{{$v.teacher_name}}</td>
							<td>{{$v.add_time}}</td>
							<td class="view-operation">
								<a href="{{$v.file_url}}" target="_blank">
									<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-download" data-am-popover="{content: '下载', trigger: 'hover focus'}"></button>
								</a>
								<a href="{{:U('Admin/Live/PreviewResource', array('id'=>$v['id']))}}">
									<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-eye" data-am-popover="{content: '预览', trigger: 'hover focus'}"></button>
								</a>
								<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-trash-o submit-delete" data-url="{{:U('Admin/Live/DeleteResource')}}" data-id="{{$v.id}}"></button>
							</td>
						</tr>
					</foreach>
				<else />
					<tr><td colspan="8" class="table-no">{{:L('common_not_data_tips')}}</td></tr>
				</if>
			</tbody>
		</table>
		<!-- list end -->

		<!-- page start -->
		<if condition="!empty($list)">
			{{$page_html}}
		</if>
		<!-- page end -->
	</div>
</div>
<!-- right content end  -->

<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->
