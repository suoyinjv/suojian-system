<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- 页面标题 -->
		<div class="am-g" style="margin-bottom:15px;">
			<div class="am-u-sm-6">
				<span class="fs-16 fw-700">🎬 回放管理</span>
			</div>
			<div class="am-u-sm-6 tr">
				<a href="{:U('Admin/Live/replayAdd')}" class="am-btn am-btn-primary am-radius am-btn-sm">
					<i class="am-icon-plus"></i> 新增回放
				</a>
			</div>
		</div>

		<!-- 筛选 -->
		<form class="am-form am-form-inline" method="get" style="margin-bottom:15px;">
			<div class="am-form-group">
				<select name="course_id" class="am-radius" onchange="this.form.submit()">
					<option value="0">全部课程</option>
					<foreach name="course_list" item="v">
						<option value="{{$v.id}}" <if condition="$course_id == $v['id']">selected</if>>{{$v.title}}</option>
					</foreach>
				</select>
			</div>
		</form>

		<!-- 回放列表 -->
		<div class="am-panel am-panel-default">
			<div class="am-panel-bd">
				<table class="am-table am-table-bordered am-table-striped">
					<thead>
						<tr>
							<th>回放标题</th>
							<th>关联课程</th>
							<th>时长</th>
							<th>播放次数</th>
							<th>Session</th>
							<th>创建时间</th>
							<th>操作</th>
						</tr>
					</thead>
					<tbody>
						<volist name="list" id="vo">
						<tr>
							<td>{$vo.title}</td>
							<td>{$vo.course_title}</td>
							<td>{$vo.duration_text}</td>
							<td>{$vo.views|default=0}</td>
							<td><code>{$vo.session_id|default='-'}</code></td>
							<td>{$vo.create_time}</td>
							<td>
								<if condition="$vo['url']">
									<a href="{$vo.url}" target="_blank" class="am-btn am-btn-success am-btn-xs am-radius"><i class="am-icon-play"></i> 播放</a>
								</if>
								<a href="javascript:;" onclick="delReplay({$vo.id})" class="am-btn am-btn-danger am-btn-xs am-radius">删除</a>
							</td>
						</tr>
						</volist>
						<if condition="count($list) == 0">
						<tr><td colspan="7" class="am-text-center cr-999">暂无回放记录</td></tr>
						</if>
					</tbody>
				</table>
				<div class="am-pagination">{{$page}}</div>
			</div>
		</div>
	</div>
</div>
<!-- right content end -->

<include file="Public/Footer" />

<script>
function delReplay(id) {
    if (!confirm('确定删除此回放记录？')) return;
    $.ajax({
        url: '{:U("Admin/Live/replayDelete")}',
        type: 'POST',
        data: {id: id},
        dataType: 'json',
        success: function(res) {
            if (res.code == 1) {
                location.reload();
            } else {
                alert(res.msg);
            }
        }
    });
}
</script>
