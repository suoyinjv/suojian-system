<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>校区管理 - SchoolCMS</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-u-sm-12">
            <div class="am-btn-toolbar">
                <a href="__CONTROLLER__/add" class="am-btn am-btn-primary am-radius">
                    <i class="am-icon-plus"></i> 添加校区
                </a>
                <a href="__CONTROLLER__/crossCampusStudent" class="am-btn am-btn-success am-radius">
                    <i class="am-icon-users"></i> 跨校学员
                </a>
                <a href="__CONTROLLER__/crossCampusTeacher" class="am-btn am-btn-warning am-radius">
                    <i class="am-icon-user"></i> 跨校老师
                </a>
            </div>
            <table class="am-table am-table-bordered am-table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>校区名称</th>
                        <th>编码</th>
                        <th>地址</th>
                        <th>电话</th>
                        <th>负责人</th>
                        <th>学员数</th>
                        <th>老师数</th>
                        <th>班级数</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <volist name="list" id="vo">
                    <tr>
                        <td>{$vo.id}</td>
                        <td>{$vo.name}</td>
                        <td>{$vo.code}</td>
                        <td>{$vo.address}</td>
                        <td>{$vo.phone}</td>
                        <td>{$vo.principal}</td>
                        <td><span class="am-badge am-badge-primary">{$vo.student_count}</span></td>
                        <td><span class="am-badge am-badge-success">{$vo.teacher_count}</span></td>
                        <td><span class="am-badge am-badge-warning">{$vo.class_count}</span></td>
                        <td>{$vo.status_text}</td>
                        <td>
                            <a href="__CONTROLLER__/overview/id/{$vo.id}">数据</a>
                            <a href="__CONTROLLER__/edit/id/{$vo.id}">编辑</a>
                            <a href="javascript:;" onclick="deleteConfirm('__CONTROLLER__/delete/id/{$vo.id}')">删除</a>
                        </td>
                    </tr>
                    </volist>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
function deleteConfirm(url) {
    if(confirm('确定要删除吗？')) {
        location.href = url;
    }
}
</script>
</body>
</html>
