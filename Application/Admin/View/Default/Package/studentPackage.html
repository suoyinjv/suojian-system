<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>学员课程包</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-g am-margin-top">
            <div class="am-u-sm-12">
                <div class="am-panel am-panel-success">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-user"></i> {$studentName} - 课程包列表</h3>
                    </div>
                    <div class="am-panel-bd">
                        <a href="{:U('buyPackage?student_id='.I('student_id'))}" class="am-btn am-btn-primary am-radius am-margin-bottom">
                            <i class="am-icon-plus"></i> 购买课程包
                        </a>
                        
                        <table class="am-table am-table-bordered am-table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>课程包名称</th>
                                    <th>购买时间</th>
                                    <th>有效期至</th>
                                    <th>总课时</th>
                                    <th>剩余课时</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <volist name="list" id="vo">
                                <tr>
                                    <td>{$vo.id}</td>
                                    <td>{$vo.package_name}</td>
                                    <td>{$vo.create_time|date='Y-m-d',###}</td>
                                    <td>{$vo.expire_time|date='Y-m-d',###|default='永久'}</td>
                                    <td>{$vo.total_hours}</td>
                                    <td><span class="am-badge am-badge-success">{$vo.remaining_hours}</span></td>
                                    <td>
                                        <if condition="$vo['status'] eq 1">
                                            <span class="am-badge am-badge-success">正常</span>
                                        <elseif condition="$vo['status'] eq 2"/>
                                            <span class="am-badge am-badge-warning">已用完</span>
                                        <else/>
                                            <span class="am-badge am-badge-default">已过期</span>
                                        </if>
                                    </td>
                                    <td>
                                        <a href="{:U('consumptionLog?student_package_id='.$vo['id'])}">消费记录</a>
                                    </td>
                                </tr>
                                </volist>
                                <notpresent name="list">
                                <tr><td colspan="8" class="text-center">暂无课程包</td></tr>
                                </notpresent>
                            </tbody>
                        </table>
                        
                        <a href="{:U('Student/index')}" class="am-btn am-btn-default am-margin-top">
                            <i class="am-icon-arrow-left"></i> 返回学员列表
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
</body>
</html>
