<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>营销活动管理 - SchoolCMS</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
    <style>
        .status-tag { padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .status-1 { background: #e6f7ff; color: #1890ff; }
        .status-2 { background: #fff7e6; color: #fa8c16; }
        .status-3 { background: #f6ffed; color: #52c41a; }
        .status-4 { background: #fff1f0; color: #f5222d; }
    </style>
</head>
<body>
<div class="admin-content">
    <div class="am-u-sm-12">
        <h2>📣 营销活动管理</h2>
        
        <div class="am-g" style="margin-bottom: 15px;">
            <div class="am-u-sm-12">
                <a href="{:U('save')}" class="am-btn am-btn-primary am-radius"><i class="am-icon-plus"></i> 新建活动</a>
                <a href="{:U('record')}" class="am-btn am-btn-default am-radius"><i class="am-icon-list"></i> 活动记录</a>
                <a href="{:U('report')}" class="am-btn am-btn-default am-radius"><i class="am-icon-bar-chart"></i> 数据报表</a>
            </div>
        </div>
        
        <form class="am-form am-form-horizontal" method="get">
            <div class="am-form-group">
                <div class="am-u-sm-3">
                    <input type="text" name="keyword" placeholder="活动名称" value="{:I('keyword')}">
                </div>
                <div class="am-u-sm-2">
                    <select name="status">
                        <option value="">全部状态</option>
                        <option value="1" {:I('status')==1?'selected':''}>草稿</option>
                        <option value="2" {:I('status')==2?'selected':''}>进行中</option>
                        <option value="3" {:I('status')==3?'selected':''}>已结束</option>
                    </select>
                </div>
                <div class="am-u-sm-2">
                    <button type="submit" class="am-btn am-btn-default">搜索</button>
                </div>
            </div>
        </form>
        
        <div class="am-panel am-panel-default">
            <div class="am-panel-bd">
                <table class="am-table am-table-bordered am-table-striped">
                    <thead>
                        <tr>
                            <th>活动名称</th>
                            <th>类型</th>
                            <th>时间</th>
                            <th>状态</th>
                            <th>参与人数</th>
                            <th>转化数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <volist name="list" id="vo">
                        <tr>
                            <td>{$vo.name}</td>
                            <td>{$vo.type_text}</td>
                            <td>{:date('m-d', $vo['start_time'])} ~ {:date('m-d', $vo['end_time'])}</td>
                            <td><span class="status-tag status-{$vo.status}">{$vo.status_text}</span></td>
                            <td>{$vo.join_count|default=0}</td>
                            <td>{$vo.convert_count|default=0}</td>
                            <td>
                                <a href="{:U('detail', array('id'=>$vo['id']))}">查看</a>
                                <a href="{:U('save', array('id'=>$vo['id']))}">编辑</a>
                                <a href="javascript:;" onclick="setStatus({$vo.id}, 1)">开启</a>
                                <a href="javascript:;" onclick="setStatus({$vo.id}, 2)">暂停</a>
                                <a href="javascript:;" onclick="del({$vo.id})">删除</a>
                            </td>
                        </tr>
                        </volist>
                    </tbody>
                </table>
                <div class="am-pagination">{$page}</div>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
function setStatus(id, status) {
    location.href = '__CONTROLLER__/setStatus?id=' + id + '&status=' + status;
}
function del(id) {
    if(confirm('确定删除此活动？')) {
        location.href = '__CONTROLLER__/delete?id=' + id;
    }
}
</script>
</body>
</html>
