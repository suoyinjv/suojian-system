<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- form start -->
		<form class="am-form view-list" action="{{:U('Admin/Marketing/Index')}}" method="POST">
			<div class="am-g">
				<input type="text" class="am-radius form-keyword" placeholder="活动名称" name="name" <present name="param['name']"> value="{{$param.name}}"</present> />
				<select name="type" class="am-radius c-p m-l-5">
					<option value="">全部类型</option>
					<option value="1" <if condition="isset($param['type']) and $param['type'] eq 1">selected</if>>公开课</option>
					<option value="2" <if condition="isset($param['type']) and $param['type'] eq 2">selected</if>>体验课</option>
					<option value="3" <if condition="isset($param['type']) and $param['type'] eq 3">selected</if>>优惠活动</option>
					<option value="4" <if condition="isset($param['type']) and $param['type'] eq 4">selected</if>>招生活动</option>
				</select>
				<select name="status" class="am-radius c-p m-l-5">
					<option value="-1">全部状态</option>
					<option value="0" <if condition="isset($param['status']) and $param['status'] eq 0">selected</if>>未开始</option>
					<option value="1" <if condition="isset($param['status']) and $param['status'] eq 1">selected</if>>进行中</option>
					<option value="2" <if condition="isset($param['status']) and $param['status'] eq 2">selected</if>>已结束</option>
				</select>
				<button type="submit" class="am-btn am-btn-secondary am-btn-sm am-radius form-submit">{{:L('common_operation_query')}}</button>
			</div>
		</form>
		<!-- form end -->

		<!-- operation start -->
		<div class="am-g m-t-15">
			<a href="{{:U('Admin/Marketing/SaveInfo')}}" class="am-btn am-btn-secondary am-radius am-btn-xs am-icon-plus"> 新增活动</a>
		</div>
		<!-- operation end -->

		<!-- list start -->
		<table class="am-table am-table-striped am-table-hover am-text-middle m-t-10">
			<thead>
				<tr>
					<th>ID</th>
					<th>活动名称</th>
					<th>类型</th>
					<th>时间范围</th>
					<th>状态</th>
					<th>浏览量</th>
					<th>报名数</th>
					<th>转化率</th>
					<th>{{:L('common_operation_name')}}</th>
				</tr>
			</thead>
			<tbody>
				<if condition="!empty($list)">
					<foreach name="list" item="v">
						<tr id="data-list-{{$v.id}}">
							<td>{{$v.id}}</td>
							<td>{{$v.name}}</td>
							<td>
								<if condition="$v['type'] eq 1"><span class="am-badge am-badge-primary">公开课</span>
								<elseif condition="$v['type'] eq 2" /><span class="am-badge am-badge-success">体验课</span>
								<elseif condition="$v['type'] eq 3" /><span class="am-badge am-badge-warning">优惠活动</span>
								<else /><span class="am-badge am-badge-secondary">招生活动</span>
								</if>
							</td>
							<td>{{$v.start_time}} ~ {{$v.end_time}}</td>
							<td>
								<if condition="$v['status'] eq 0"><span class="am-badge">未开始</span>
								<elseif condition="$v['status'] eq 1" /><span class="am-badge am-badge-primary">进行中</span>
								<else /><span class="am-badge am-badge-default">已结束</span>
								</if>
							</td>
							<td>{{$v.view_count}}</td>
							<td>{{$v.signup_count}}</td>
							<td>{{$v.conversion_rate}}%</td>
							<td class="view-operation">
								<a href="{{:U('Admin/Marketing/Detail', array('id'=>$v['id']))}}">
									<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-eye" data-am-popover="{content: '查看详情', trigger: 'hover focus'}"></button>
								</a>
								<a href="{{:U('Admin/Marketing/SaveInfo', array('id'=>$v['id']))}}">
									<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-edit" data-am-popover="{content: '{{:L('common_operation_edit')}}', trigger: 'hover focus'}"></button>
								</a>
								<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-trash-o submit-delete" data-url="{{:U('Admin/Marketing/Delete')}}" data-id="{{$v.id}}"></button>
							</td>
						</tr>
					</foreach>
				<else />
					<tr><td colspan="9" class="table-no">{{:L('common_not_data_tips')}}</td></tr>
				</if>
			</tbody>
		</table>
		<!-- list end -->

		<!-- page start -->
		<if condition="!empty($list)">
			{{$page_html}}
		</if>
		<!-- page end -->
	</div>
</div>
<!-- right content end  -->

<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->

<script>
$(function(){
	// 状态颜色
	$('.am-badge:contains("进行中")').parent().addClass('am-text-primary');
	$('.am-badge:contains("已结束")').parent().addClass('am-text-default');
});
</script>
