<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>短信记录</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-g am-margin-top">
            <div class="am-u-sm-12">
                <div class="am-panel am-panel-primary">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title">
                            <i class="am-icon-history"></i> 短信发送记录
                            <a href="{:U('send')}" class="am-btn am-btn-xs am-btn-primary am-radius am-fr">
                                <i class="am-icon-plus"></i> 发送短信
                            </a>
                        </h3>
                    </div>
                    <div class="am-panel-bd">
                        <!-- 筛选 -->
                        <form class="am-form am-form-inline am-margin-bottom">
                            <div class="am-form-group">
                                <input type="text" name="phone" class="am-form-field" placeholder="手机号" value="{:I('phone')}">
                            </div>
                            <div class="am-form-group">
                                <select name="status" class="am-form-field">
                                    <option value="">全部状态</option>
                                    <option value="1" <if condition="I('status') eq 1">selected</if>>发送成功</option>
                                    <option value="0" <if condition="I('status') eq 0">selected</if>>发送失败</option>
                                </select>
                            </div>
                            <div class="am-form-group">
                                <input type="date" name="start_date" class="am-form-field" value="{:I('start_date')}">
                            </div>
                            <div class="am-form-group">-</div>
                            <div class="am-form-group">
                                <input type="date" name="end_date" class="am-form-field" value="{:I('end_date')}">
                            </div>
                            <button type="submit" class="am-btn am-btn-primary">筛选</button>
                        </form>
                        
                        <table class="am-table am-table-bordered am-table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>手机号</th>
                                    <th>内容</th>
                                    <th>类型</th>
                                    <th>状态</th>
                                    <th>发送时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <volist name="list" id="vo">
                                <tr>
                                    <td>{$vo.id}</td>
                                    <td>{$vo.phone}</td>
                                    <td class="am-text-truncate" style="max-width:200px;">{$vo.content}</td>
                                    <td>{$vo.type_text}</td>
                                    <td>
                                        <if condition="$vo['status'] eq 1">
                                            <span class="am-badge am-badge-success">成功</span>
                                        <else/>
                                            <span class="am-badge am-badge-danger">失败</span>
                                        </if>
                                    </td>
                                    <td>{$vo.create_time|date='Y-m-d H:i',###}</td>
                                    <td>
                                        <a href="javascript:;" onclick="viewDetail({$vo.id})">详情</a>
                                    </td>
                                </tr>
                                </volist>
                                <notpresent name="list">
                                <tr><td colspan="7" class="text-center">暂无记录</td></tr>
                                </notpresent>
                            </tbody>
                        </table>
                        
                        {$page}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/static/js/jquery-2.0.0.min.js"></script>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
function viewDetail(id) {
    $.get('__CONTROLLER__/getLog?id=' + id, function(res) {
        if (res.data) {
            alert('手机号: ' + res.data.phone + '\n内容: ' + res.data.content + '\n状态: ' + (res.data.status == 1 ? '成功' : '失败'));
        }
    });
}
</script>
</body>
</html>
