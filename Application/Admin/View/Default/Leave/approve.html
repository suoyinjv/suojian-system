<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- form start -->
		<form class="am-form view-list" action="{{:U('Admin/Leave/Approve')}}" method="POST">
			<div class="am-g">
				<input type="text" class="am-radius form-keyword" placeholder="请输入学员姓名搜索" name="keyword" <present name="param['keyword']"> value="{{$param.keyword}}"</present> />
				<button type="submit" class="am-btn am-btn-secondary am-btn-sm am-radius form-submit">查询</button>
				<label class="fs-12 m-l-5 c-p fw-100 more-submit">
					更多筛选
					<input type="checkbox" name="is_more" value="1" id="is_more" <if condition="isset($param['is_more']) and $param['is_more'] eq 1">checked</if> />
					<i class="am-icon-angle-down"></i>
				</label>

				<div class="more-where <if condition="!isset($param['is_more']) or $param['is_more'] neq 1">none</if>">
					<select class="am-radius c-p m-t-10 m-l-5 param-where" name="type">
						<option value="">请假类型</option>
						<option value="1" <if condition="isset($param['type']) and $param['type'] eq 1">selected</if>>事假</option>
						<option value="2" <if condition="isset($param['type']) and $param['type'] eq 2">selected</if>>病假</option>
						<option value="3" <if condition="isset($param['type']) and $param['type'] eq 3">selected</if>>其他</option>
					</select>
					<select name="status" class="am-radius c-p m-t-10 m-l-5 param-where">
						<option value="-1">审批状态</option>
						<option value="0" <if condition="isset($param['status']) and $param['status'] eq 0">selected</if>>待审批</option>
						<option value="1" <if condition="isset($param['status']) and $param['status'] eq 1">selected</if>>已批准</option>
						<option value="2" <if condition="isset($param['status']) and $param['status'] eq 2">selected</if>>已拒绝</option>
						<option value="3" <if condition="isset($param['status']) and $param['status'] eq 3">selected</if>>已取消</option>
					</select>
					<div class="param-date param-where m-l-5">
						<input type="text" name="time_start" readonly="readonly" class="am-radius m-t-10" placeholder="开始日期" id="time_start" <if condition="isset($param['time_start'])">value="{{$param.time_start}}"</if>/>
						<span>~</span>
						<input type="text" readonly="readonly" class="am-radius m-t-10" placeholder="结束日期" name="time_end" id="time_end" <if condition="isset($param['time_end'])">value="{{$param.time_end}}"</if>/>
					</div>
				</div>
			</div>
        </form>
        <!-- form end -->

		<!-- operation start -->
		<div class="am-g m-t-15">
			<span class="am-badge am-badge-warning m-r-10">待审批: {{$pending_count}}</span>
			<a href="{{:U('Admin/Leave/Index')}}" class="am-btn am-btn-default am-radius am-btn-xs">返回列表</a>
		</div>
		<!-- operation end -->

		<!-- list start -->
		<table class="am-table am-table-striped am-table-hover am-text-middle m-t-10 m-l-5">
			<thead>
				<tr>
					<th>学员姓名</th>
					<th class="am-hide-sm-only">请假类型</th>
					<th class="am-hide-sm-only">开始日期</th>
					<th class="am-hide-sm-only">结束日期</th>
					<th class="am-hide-sm-only">请假天数</th>
					<th class="am-hide-sm-only">审批状态</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<if condition="!empty($list)">
					<foreach name="list" item="v">
						<tr id="data-list-{{$v.id}}">
							<td>{{$v.student_name}}</td>
							<td class="am-hide-sm-only">
								<if condition="$v['type'] eq 1">事假
								<elseif condition="$v['type'] eq 2" />病假
								<else />其他
								</if>
							</td>
							<td class="am-hide-sm-only">{{$v.start_date}}</td>
							<td class="am-hide-sm-only">{{$v.end_date}}</td>
							<td class="am-hide-sm-only">{{$v.days}}天</td>
							<td class="am-hide-sm-only">
								<if condition="$v['status'] eq 0"><span class="am-badge">待审批</span>
								<elseif condition="$v['status'] eq 1" /><span class="am-badge am-badge-success">已批准</span>
								<elseif condition="$v['status'] eq 2" /><span class="am-badge am-badge-danger">已拒绝</span>
								<else /><span class="am-badge am-badge-default">已取消</span>
								</if>
							</td>
							<td class="view-operation">
								<a href="{{:U('Admin/Leave/Detail', array('id'=>$v['id']))}}">
									<button class="am-btn am-btn-primary am-btn-xs am-radius am-icon-eye" data-am-popover="{content: '查看详情', trigger: 'hover focus'}"></button>
								</a>
								<if condition="$v['status'] eq 0">
									<button class="am-btn am-btn-success am-btn-xs am-radius am-icon-check approve-btn" data-id="{{$v.id}}" data-am-popover="{content: '批准', trigger: 'hover focus'}"></button>
									<button class="am-btn am-btn-danger am-btn-xs am-radius am-icon-close reject-btn" data-id="{{$v.id}}" data-am-popover="{content: '拒绝', trigger: 'hover focus'}"></button>
								</if>
							</td>
						</tr>
					</foreach>
				<else />
					<tr><td colspan="7" class="table-no">暂无数据</td></tr>
				</if>
			</tbody>
		</table>
		<!-- list end -->

		<!-- page start -->
		<if condition="!empty($list)">
			{{$page_html}}
		</if>
		<!-- page end -->
	</div>
</div>
<!-- right content end  -->

<!-- approve modal start -->
<div class="am-modal am-modal-prompt" id="approve-prompt">
	<div class="am-modal-dialog">
		<div class="am-modal-hd">审批备注（可选）</div>
		<div class="am-modal-bd">
			<textarea class="am-modal-prompt-input" id="approve-remark" placeholder="请输入审批备注..."></textarea>
		</div>
		<div class="am-modal-footer">
			<span class="am-modal-btn" data-am-modal-cancel>取消</span>
			<span class="am-modal-btn" data-am-modal-confirm>提交</span>
		</div>
	</div>
</div>
<!-- approve modal end -->

<script type="text/javascript">
$(function(){
	// 批准
	$('.approve-btn').on('click', function(){
		var id = $(this).data('id');
		$('#approve-prompt').modal({
			relatedTarget: this,
			onConfirm: function(e) {
				$.ajax({
					url: '{{:U("Admin/Leave/Approve")}}',
					type: 'POST',
					data: {id: id, action: 'approve', remark: e.data},
					dataType: 'json',
					success: function(res) {
						if(res.code == 1) {
							alert(res.msg);
							location.reload();
						} else {
							alert(res.msg);
						}
					}
				});
			}
		});
	});

	// 拒绝
	$('.reject-btn').on('click', function(){
		var id = $(this).data('id');
		$('#approve-prompt').modal({
			relatedTarget: this,
			onConfirm: function(e) {
				$.ajax({
					url: '{{:U("Admin/Leave/Approve")}}',
					type: 'POST',
					data: {id: id, action: 'reject', remark: e.data},
					dataType: 'json',
					success: function(res) {
						if(res.code == 1) {
							alert(res.msg);
							location.reload();
						} else {
							alert(res.msg);
						}
					}
				});
			}
		});
	});
});
</script>
		
<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->
