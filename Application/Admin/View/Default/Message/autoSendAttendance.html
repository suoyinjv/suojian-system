<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- table nav start -->
		<include file="Nav" />
		<!-- table nav end -->

		<div class="am-panel am-panel-primary">
			<div class="am-panel-hd">
				<h3 class="am-panel-title">
					<i class="am-icon-bell"></i> {{:L('message_auto_attendance_title')}}
				</h3>
			</div>
			<div class="am-panel-bd">
				<form class="am-form form-validation view-save" action="{{:U('Admin/Message/SaveAutoAttendance')}}" method="POST" request-type="ajax-url" request-value="{{:U('Admin/Message/AutoSendAttendance')}}">

					<div class="am-form-group">
						<label>{{:L('message_auto_enable')}}</label>
						<div class="am-g">
							<div class="am-u-sm-4">
								<select name="is_enable" id="isEnable" class="am-form-field am-radius">
									<option value="1" <if condition="isset($data) and $data['is_enable'] eq 1">selected</if>>{{:L('common_status_on')}}</option>
									<option value="0" <if condition="!isset($data) or $data['is_enable'] eq 0">selected</if>>{{:L('common_status_off')}}</option>
								</select>
							</div>
							<div class="am-u-sm-8 am-text-muted am-padding-vertical-sm">
								<i class="am-icon-info-circle"></i> {{:L('message_auto_enable_tips')}}
							</div>
						</div>
					</div>

					<div class="am-form-group" id="timeGroup">
						<label>{{:L('message_auto_send_time')}}</label>
						<div class="am-g">
							<div class="am-u-sm-4">
								<select name="send_time" class="am-form-field am-radius">
									<option value="08:00" <if condition="isset($data) and $data['send_time'] eq '08:00'">selected</if>>08:00</option>
									<option value="09:00" <if condition="isset($data) and $data['send_time'] eq '09:00'">selected</if>>09:00</option>
									<option value="10:00" <if condition="isset($data) and $data['send_time'] eq '10:00'">selected</if>>10:00</option>
									<option value="11:00" <if condition="isset($data) and $data['send_time'] eq '11:00'">selected</if>>11:00</option>
									<option value="12:00" <if condition="isset($data) and $data['send_time'] eq '12:00'">selected</if>>12:00</option>
									<option value="13:00" <if condition="isset($data) and $data['send_time'] eq '13:00'">selected</if>>13:00</option>
									<option value="14:00" <if condition="isset($data) and $data['send_time'] eq '14:00'">selected</if>>14:00</option>
									<option value="15:00" <if condition="isset($data) and $data['send_time'] eq '15:00'">selected</if>>15:00</option>
									<option value="16:00" <if condition="isset($data) and $data['send_time'] eq '16:00'">selected</if>>16:00</option>
									<option value="17:00" <if condition="isset($data) and $data['send_time'] eq '17:00'">selected</if>>17:00</option>
									<option value="18:00" <if condition="!isset($data) or $data['send_time'] eq '18:00'">selected</if>>18:00</option>
									<option value="19:00" <if condition="isset($data) and $data['send_time'] eq '19:00'">selected</if>>19:00</option>
									<option value="20:00" <if condition="isset($data) and $data['send_time'] eq '20:00'">selected</if>>20:00</option>
								</select>
							</div>
							<div class="am-u-sm-8 am-text-muted am-padding-vertical-sm">
								<i class="am-icon-info-circle"></i> {{:L('message_auto_send_time_tips')}}
							</div>
						</div>
					</div>

					<div class="am-form-group">
						<label>{{:L('message_auto_channel')}}</label>
						<div class="am-g">
							<div class="am-u-sm-4">
								<select name="channel" class="am-form-field am-radius">
									<option value="sms" <if condition="isset($data) and $data['channel'] eq 'sms'">selected</if>>{{:L('message_channel_sms')}}</option>
									<option value="weixin" <if condition="!isset($data) or $data['channel'] eq 'weixin'">selected</if>>{{:L('message_channel_weixin')}}</option>
									<option value="both" <if condition="isset($data) and $data['channel'] eq 'both'">selected</if>>{{:L('message_channel_both')}}</option>
								</select>
							</div>
						</div>
					</div>

					<div class="am-form-group">
						<label>{{:L('message_auto_template')}} ({{:L('message_optional')}})</label>
						<select id="templateSelect" class="am-form-field am-radius">
							<option value="">{{:L('message_no_template')}}</option>
						</select>
					</div>

					<div class="am-form-group">
						<label>{{:L('message_auto_content')}} <span class="am-text-danger">*</span></label>
						<textarea name="content" class="am-form-field am-radius" rows="5" id="msgContent" placeholder="{{:L('message_auto_content_tips')}}" required data-validation-message="{{:L('message_auto_content_required')}}"><present name="data">{$data.content}</present></textarea>
						<p class="am-text-sm am-text-muted">{{:L('message_template_var_tips')}}: {name}, {course}, {date}, {time}, {class}, {status}, {teacher}</p>
					</div>

					<div class="am-alert am-alert-warning" data-am-alert>
						<i class="am-icon-info-circle"></i> {{:L('message_auto_attendance_tips')}}
					</div>

					<div class="am-form-group">
						<button type="submit" class="am-btn am-btn-primary btn-loading-example am-radius" data-am-loading="{loadingText:'{{:L('common_form_loading_tips')}}'}">
							<i class="am-icon-check"></i> {{:L('common_operation_save')}}
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
<!-- right content end  -->

<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->

<script>
$(function() {
	loadTemplates();

	$('#templateSelect').change(function() {
		if ($(this).val()) {
			$.get('__CONTROLLER__/getTemplate?id=' + $(this).val(), function(res) {
				if (res.data) {
					$('#msgContent').val(res.data.content);
				}
			});
		}
	});
});

function loadTemplates() {
	$.get('__CONTROLLER__/templateLists?json=1&type=attendance', function(res) {
		var html = '<option value="">{{:L("message_no_template")}}</option>';
		if (res.data) {
			$.each(res.data, function(i, v) {
				html += '<option value="' + v.id + '">' + v.name + '</option>';
			});
		}
		$('#templateSelect').html(html);
	});
}
</script>
