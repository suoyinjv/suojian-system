<script>
$(function() {
	loadStudents();
	loadClasses();
	loadTemplates();

	$('#receiverType').change(function() {
		var val = $(this).val();
		$('#customReceivers').toggle(val == 'custom');
		$('#studentSelectGroup').toggle(val == 'student');
		$('#classSelectGroup').toggle(val == 'class');
	});

	$('#msgContent').on('input', function() {
		$('#charCount').text($(this).val().length);
	});

	$('#templateSelect').change(function() {
		if ($(this).val()) {
			$.get('/getTemplate?id=' + $(this).val(), function(res) {
				if (res.data) {
					$('#msgContent').val(res.data.content);
					$('#charCount').text(res.data.content.length);
				}
			});
		}
	});
});

function loadStudents() {
	$.get('/getStudents?json=1', function(res) {
		var html = '<option value=""><?php echo L("common_please_select"); ?></option>';
		if (res.data) {
			$.each(res.data, function(i, v) {
				html += '<option value="' + v.id + '">' + v.name + '</option>';
			});
		}
		$('#studentSelect').html(html);
	});
}

function loadClasses() {
	$.get('/getClasses?json=1', function(res) {
		var html = '<option value=""><?php echo L("common_please_select"); ?></option>';
		if (res.data) {
			$.each(res.data, function(i, v) {
				html += '<option value="' + v.id + '">' + v.name + '</option>';
			});
		}
		$('#classSelect').html(html);
	});
}

function loadTemplates() {
	$.get('/templateLists?json=1', function(res) {
		var html = '<option value=""><?php echo L("message_no_template"); ?></option>';
		if (res.data) {
			$.each(res.data, function(i, v) {
				html += '<option value="' + v.id + '">' + v.name + '</option>';
			});
		}
		$('#templateSelect').html(html);
	});
}
</script>
