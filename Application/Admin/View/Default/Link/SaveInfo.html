<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- form start -->
		<form class="am-form form-validation view-save" action="{{:U('Admin/Link/Save')}}" method="POST" request-type="ajax-url" request-value="{{:U('Admin/Link/Index')}}">
			<legend>
				<span class="fs-16">
					<if condition="empty($data['id'])">
						新增友链
					<else />
						编辑友链
					</if>
				</span>
				<a href="{{:U('Admin/Link/Index')}}" class="fr fs-14 m-t-5 am-icon-mail-reply"> {{:L('common_operation_back')}}</a>
			</legend>

			<div class="am-form-group">
				<label>链接名称</label>
				<input type="text" name="name" placeholder="链接名称" class="am-radius" <notempty name="data"> value="{{$data.name}}"</notempty> required />
			</div>

			<div class="am-form-group">
				<label>链接地址</label>
				<input type="url" name="url" placeholder="http://" class="am-radius" <notempty name="data"> value="{{$data.url}}"</notempty> required />
			</div>

			<div class="am-form-group">
				<label>排序</label>
				<input type="number" name="sort" placeholder="排序，数字越小越靠前" class="am-radius" <notempty name="data"> value="{{$data.sort}}"</notempty> value="0" />
			</div>

			<div class="am-form-group">
				<label>状态</label>
				<div>
					<label class="am-radio-inline m-r-10">
						<input type="radio" name="is_show" value="1" <if condition="!isset($data['is_show']) or $data['is_show'] == 1">checked="checked"</if> data-am-ucheck /> 显示
					</label>
					<label class="am-radio-inline m-r-10">
						<input type="radio" name="is_show" value="0" <if condition="isset($data['is_show']) and $data['is_show'] == 0">checked="checked"</if> data-am-ucheck /> 隐藏
					</label>
				</div>
			</div>

			<div class="am-form-group">
				<input type="hidden" name="id" <notempty name="data"> value="{{$data.id}}"</notempty> />
				<button type="submit" class="am-btn am-btn-primary am-radius btn-loading-example am-btn-sm w100" data-am-loading="{loadingText:'{{:L('common_form_loading_tips')}}'}">{{:L('common_operation_save')}}</button>
			</div>
		</form>
		<!-- form end -->
	</div>
</div>
<!-- right content end  -->

<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->
