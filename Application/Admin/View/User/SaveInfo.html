<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- form start -->
		<form class="am-form form-validation view-save" action="{{:U('Admin/User/Save')}}" method="POST" request-type="ajax-url" request-value="{{:U('Admin/User/Index')}}">
			<legend>
				<span class="fs-16">
					<if condition="empty($data['id'])">
						新增用户
					<else />
						编辑用户
					</if>
				</span>
				<a href="{{:U('Admin/User/Index')}}" class="fr fs-14 m-t-5 am-icon-mail-reply"> {{:L('common_operation_back')}}</a>
			</legend>

			<div class="am-form-group">
				<label>用户名</label>
				<input type="text" name="username" placeholder="用户名" class="am-radius" <notempty name="data"> value="{{$data.username}}"</notempty> required />
			</div>

			<div class="am-form-group">
				<label>姓名</label>
				<input type="text" name="name" placeholder="姓名" class="am-radius" <notempty name="data"> value="{{$data.name}}"</notempty> required />
			</div>

			<div class="am-form-group">
				<label>用户类型</label>
				<select name="user_type" class="am-radius" required>
					<option value="1" <if condition="isset($data['user_type']) and $data['user_type'] eq 1">selected</if>>学员</option>
					<option value="2" <if condition="isset($data['user_type']) and $data['user_type'] eq 2">selected</if>>教师</option>
					<option value="3" <if condition="isset($data['user_type']) and $data['user_type'] eq 3">selected</if>>家长</option>
				</select>
			</div>

			<div class="am-form-group">
				<label>密码<if condition="!empty($data['id'])">（留空则不修改）</if></label>
				<input type="password" name="password" placeholder="密码" class="am-radius" <if condition="empty($data['id'])">required</if> />
			</div>

			<div class="am-form-group">
				<label>手机号</label>
				<input type="text" name="mobile" placeholder="手机号" class="am-radius" <notempty name="data"> value="{{$data.mobile}}"</notempty> />
			</div>

			<div class="am-form-group">
				<label>邮箱</label>
				<input type="email" name="email" placeholder="邮箱" class="am-radius" <notempty name="data"> value="{{$data.email}}"</notempty> />
			</div>

			<div class="am-form-group">
				<label>状态</label>
				<div>
					<label class="am-radio-inline m-r-10">
						<input type="radio" name="status" value="1" <if condition="!isset($data['status']) or $data['status'] eq 1">checked="checked"</if> data-am-ucheck /> 启用
					</label>
					<label class="am-radio-inline m-r-10">
						<input type="radio" name="status" value="0" <if condition="isset($data['status']) and $data['status'] eq 0">checked="checked"</if> data-am-ucheck /> 禁用
					</label>
				</div>
			</div>

			<div class="am-form-group">
				<input type="hidden" name="id" <notempty name="data"> value="{{$data.id}}"</notempty> />
				<button type="submit" class="am-btn am-btn-primary am-radius btn-loading-example am-btn-sm w100" data-am-loading="{loadingText:'{{:L('common_form_loading_tips')}}'}">{{:L('common_operation_save')}}</button>
			</div>
		</form>
		<!-- form end -->
	</div>
</div>
<!-- right content end  -->

<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->
