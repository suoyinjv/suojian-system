<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>请假申请 - SUOJIAN</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
    <style>
        .status-0 { color: #fa8c16; }
        .status-1 { color: #52c41a; }
        .status-2 { color: #f5222d; }
        .status-3 { color: #999; }
        .detail-row { display: flex; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .detail-label { width: 100px; color: #666; }
        .detail-value { flex: 1; font-weight: 500; }
        .process-step { padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #f8f8f8; }
        .step-done { border-left: 4px solid #52c41a; }
        .step-pending { border-left: 4px solid #faad14; }
    </style>
</head>
<body>
<div class="admin-content">
    <div class="am-u-sm-10 am-u-sm-centered">
        <div class="am-panel am-panel-default">
            <div class="am-panel-hd"><i class="am-icon-file-text"></i> 请假详情</div>
            <div class="am-panel-bd">
                <volist name="info" id="vo">
                <div class="detail-row">
                    <span class="detail-label">学员</span>
                    <span class="detail-value">{$vo.student_name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">联系电话</span>
                    <span class="detail-value">{$vo.phone}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">课程</span>
                    <span class="detail-value">{$vo.course_name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">请假类型</span>
                    <span class="detail-value">
                        <switch name="vo.type">
                            <case value="1">事假</case>
                            <case value="2">病假</case>
                            <case value="3">其他</case>
                        </switch>
                    </span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">请假时间</span>
                    <span class="detail-value">{$vo.start_date} ~ {$vo.end_date}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">课时数</span>
                    <span class="detail-value">{$vo.hours} 课时</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">请假原因</span>
                    <span class="detail-value">{$vo.reason|default='无'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">申请时间</span>
                    <span class="detail-value">{:date('Y-m-d H:i', $vo['add_time'])}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">状态</span>
                    <span class="detail-value status-{$vo.status}">
                        <switch name="vo.status">
                            <case value="0">待审批</case>
                            <case value="1">已批准</case>
                            <case value="2">已拒绝</case>
                            <case value="3">已取消</case>
                        </switch>
                    </span>
                </div>
                </volist>
                
                <if condition="$vo['status'] == 0">
                <div style="margin-top: 20px;">
                    <a href="{:U('approve', array('id'=>$vo['id']))}" class="am-btn am-btn-success am-radius" onclick="return confirm('确认批准此请假申请？')">
                        <i class="am-icon-check"></i> 批准
                    </a>
                    <a href="{:U('reject', array('id'=>$vo['id']))}" class="am-btn am-btn-danger am-radius" onclick="return confirm('确认拒绝此请假申请？')">
                        <i class="am-icon-times"></i> 拒绝
                    </a>
                    <a href="{:U('index')}" class="am-btn am-btn-default am-radius">返回</a>
                </div>
                </if>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
</body>
</html>
