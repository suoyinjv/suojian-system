<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>批量审批请假 - SUOJIAN</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
    <style>
        .select-all { padding: 10px; background: #f8f8f8; border-radius: 5px; margin-bottom: 15px; }
        .selected-count { color: #1890ff; font-weight: bold; }
    </style>
</head>
<body>
<div class="admin-content">
    <div class="am-u-sm-12">
        <h2>📋 批量审批请假申请</h2>
        
        <form id="batchForm" action="{:U('batchApprove')}" method="POST">
            <div class="am-panel am-panel-default">
                <div class="am-panel-hd">
                    <div class="select-all">
                        <label class="am-checkbox">
                            <input type="checkbox" id="selectAll"> 全选
                        </label>
                        <span style="margin-left: 20px;">已选择 <span class="selected-count" id="selectedCount">0</span> 条</span>
                    </div>
                </div>
                <div class="am-panel-bd">
                    <table class="am-table am-table-bordered am-table-striped">
                        <thead>
                            <tr>
                                <th width="50">选择</th>
                                <th>学员</th>
                                <th>课程</th>
                                <th>请假类型</th>
                                <th>时间范围</th>
                                <th>课时</th>
                                <th>原因</th>
                                <th>申请时间</th>
                            </tr>
                        </thead>
                        <tbody>
                            <volist name="list" id="vo">
                            <tr>
                                <td>
                                    <label class="am-checkbox">
                                        <input type="checkbox" name="ids[]" value="{$vo.id}">
                                    </label>
                                </td>
                                <td>{$vo.student_name}</td>
                                <td>{$vo.course_name}</td>
                                <td>
                                    <switch name="vo.type">
                                        <case value="1">事假</case>
                                        <case value="2">病假</case>
                                        <case value="3">其他</case>
                                    </switch>
                                </td>
                                <td>{$vo.start_date} ~ {$vo.end_date}</td>
                                <td>{$vo.hours}</td>
                                <td>{$vo.reason|default='-'}</td>
                                <td>{:date('m-d H:i', $vo['add_time'])}</td>
                            </tr>
                            </volist>
                        </tbody>
                    </table>
                    <if condition="count($list) == 0">
                    <div class="am-text-center am-padding-lg am-text-muted">暂无可审批的请假申请</div>
                    </if>
                </div>
            </div>
            
            <if condition="count($list) > 0">
            <div class="am-g" style="margin-top: 15px;">
                <div class="am-u-sm-12 am-text-center">
                    <button type="button" class="am-btn am-btn-success am-radius" onclick="batchApprove(1)">
                        <i class="am-icon-check"></i> 批量通过
                    </button>
                    <button type="button" class="am-btn am-btn-danger am-radius" onclick="batchApprove(2)">
                        <i class="am-icon-times"></i> 批量拒绝
                    </button>
                    <a href="{:U('index')}" class="am-btn am-btn-default am-radius">返回</a>
                </div>
            </div>
            </if>
        </form>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
$('#selectAll').change(function(){
    $('input[name="ids[]"]').prop('checked', $(this).prop('checked'));
    updateCount();
});

$('input[name="ids[]"]').change(function(){
    updateCount();
});

function updateCount() {
    var count = $('input[name="ids[]"]:checked').length;
    $('#selectedCount').text(count);
}

function batchApprove(status) {
    var count = $('input[name="ids[]"]:checked').length;
    if(count == 0) {
        alert('请至少选择一条记录');
        return;
    }
    var action = status == 1 ? '通过' : '拒绝';
    if(!confirm('确认' + action + '选中的 ' + count + ' 条申请？')) return;
    $('#batchForm').append('<input type="hidden" name="status" value="' + status + '">');
    $('#batchForm').submit();
}
</script>
</body>
</html>
