<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>学习计划统计</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
    <link rel="stylesheet" href="__PUBLIC__/font-awesome-4.4.0/css/font-awesome.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-g am-margin-top">
            <div class="am-u-sm-12">
                <!-- 概览数据 -->
                <div class="am-g am-margin-top">
                    <div class="am-u-sm-3">
                        <div class="am-panel am-panel-primary">
                            <div class="am-panel-bd am-cf">
                                <div class="am-fl">
                                    <i class="am-icon-tasks am-3x am-text-primary"></i>
                                </div>
                                <div class="am-fr">
                                    <p class="am-text-xl am-text-bold">{$total}</p>
                                    <p class="am-text-muted">计划总数</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="am-u-sm-3">
                        <div class="am-panel am-panel-success">
                            <div class="am-panel-bd am-cf">
                                <div class="am-fl">
                                    <i class="am-icon-check-circle am-3x am-text-success"></i>
                                </div>
                                <div class="am-fr">
                                    <p class="am-text-xl am-text-bold">{$completed}</p>
                                    <p class="am-text-muted">已完成</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="am-u-sm-3">
                        <div class="am-panel am-panel-warning">
                            <div class="am-panel-bd am-cf">
                                <div class="am-fl">
                                    <i class="am-icon-spinner am-3x am-text-warning"></i>
                                </div>
                                <div class="am-fr">
                                    <p class="am-text-xl am-text-bold">{$ongoing}</p>
                                    <p class="am-text-muted">进行中</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="am-u-sm-3">
                        <div class="am-panel am-panel-info">
                            <div class="am-panel-bd am-cf">
                                <div class="am-fl">
                                    <i class="am-icon-percent am-3x am-text-info"></i>
                                </div>
                                <div class="am-fr">
                                    <p class="am-text-xl am-text-bold">{$rate}%</p>
                                    <p class="am-text-muted">完成率</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 完成率进度条 -->
                <div class="am-panel am-panel-success am-margin-top">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-pie-chart"></i> 整体完成进度</h3>
                    </div>
                    <div class="am-panel-bd">
                        <div class="am-progress am-progress-lg">
                            <div class="am-progress-bar am-progress-bar-success" style="width: {$rate}%">{$rate}%</div>
                        </div>
                        <div class="am-g am-text-center">
                            <div class="am-u-sm-6">
                                <p class="am-text-success am-text-lg am-text-bold">{$completed}</p>
                                <p class="am-text-muted">已完成</p>
                            </div>
                            <div class="am-u-sm-6">
                                <p class="am-text-warning am-text-lg am-text-bold">{$ongoing}</p>
                                <p class="am-text-muted">进行中</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 学生完成率排名 -->
                <div class="am-panel am-panel-default am-margin-top">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-bar-chart"></i> 学生完成率排名</h3>
                    </div>
                    <div class="am-panel-bd">
                        <table class="am-table am-table-hover am-table-striped">
                            <thead>
                                <tr>
                                    <th>排名</th>
                                    <th>学生</th>
                                    <th>计划总数</th>
                                    <th>已完成</th>
                                    <th>完成率</th>
                                    <th>进度</th>
                                </tr>
                            </thead>
                            <tbody>
                                <volist name="studentStats" id="item" key="k">
                                <tr>
                                    <td>
                                        <if condition="$k == 1">
                                            <span class="am-badge am-badge-danger">🥇 1</span>
                                        <elseif condition="$k == 2"/>
                                            <span class="am-badge am-badge-warning">🥈 2</span>
                                        <elseif condition="$k == 3"/>
                                            <span class="am-badge am-badge-secondary">🥉 3</span>
                                        <else/>
                                            <span class="am-badge">{$k}</span>
                                        </if>
                                    </td>
                                    <td>{$item.student_name}</td>
                                    <td>{$item.total}</td>
                                    <td>{$item.completed}</td>
                                    <td>
                                        <if condition="$item['rate'] ge 80">
                                            <span class="am-text-success am-text-bold">{$item.rate}%</span>
                                        <elseif condition="$item['rate'] ge 50"/>
                                            <span class="am-text-warning am-text-bold">{$item.rate}%</span>
                                        <else/>
                                            <span class="am-text-danger">{$item.rate}%</span>
                                        </if>
                                    </td>
                                    <td>
                                        <div class="am-progress am-progress-xs am-progress-striped am-active">
                                            <div class="am-progress-bar am-progress-bar-success" style="width: {$item.rate}%"></div>
                                        </div>
                                    </td>
                                </tr>
                                </volist>
                                <if condition="empty($studentStats)">
                                <tr>
                                    <td colspan="6" class="am-text-center am-text-muted">暂无数据</td>
                                </tr>
                                </if>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="am-text-center am-margin-top">
                    <a href="{:U('index')}" class="am-btn am-btn-default">
                        <i class="am-icon-arrow-left"></i> 返回列表
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/static/js/jquery-2.0.0.min.js"></script>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
</body>
</html>
