<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>直播课程列表 - SchoolCMS</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
    <style>
        .status-tag { padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .status-0 { background: #f5f5f5; color: #999; }
        .status-1 { background: #e6f7ff; color: #1890ff; }
        .status-2 { background: #f6ffed; color: #52c41a; }
        .status-3 { background: #fff1f0; color: #f5222d; }
    </style>
</head>
<body>
<div class="admin-content">
    <div class="am-u-sm-12">
        <h2>📺 直播课程管理</h2>
        
        <div class="am-g" style="margin-bottom: 15px;">
            <div class="am-u-sm-12">
                <a href="{:U('add')}" class="am-btn am-btn-primary am-radius"><i class="am-icon-plus"></i> 新建直播</a>
                <a href="{:U('bookingList')}" class="am-btn am-btn-default am-radius"><i class="am-icon-calendar"></i> 预约记录</a>
                <a href="{:U('resource')}" class="am-btn am-btn-default am-radius"><i class="am-icon-folder"></i> 备课资源</a>
                <a href="{:U('replay')}" class="am-btn am-btn-default am-radius"><i class="am-icon-play-circle"></i> 回放管理</a>
            </div>
        </div>
        
        <form class="am-form am-form-horizontal" method="get">
            <div class="am-form-group">
                <div class="am-u-sm-3">
                    <input type="text" name="keyword" placeholder="课程名称/老师" value="{:I('keyword')}">
                </div>
                <div class="am-u-sm-2">
                    <select name="status">
                        <option value="">全部状态</option>
                        <option value="0" {:I('status')==0?'selected':''}>未开始</option>
                        <option value="1" {:I('status')==1?'selected':''}>直播中</option>
                        <option value="2" {:I('status')==2?'selected':''}>已结束</option>
                    </select>
                </div>
                <div class="am-u-sm-2">
                    <button type="submit" class="am-btn am-btn-default">搜索</button>
                </div>
            </div>
        </form>
        
        <div class="am-panel am-panel-default">
            <div class="am-panel-bd">
                <table class="am-table am-table-bordered am-table-striped">
                    <thead>
                        <tr>
                            <th>课程名称</th>
                            <th>主讲老师</th>
                            <th>上课时间</th>
                            <th>时长</th>
                            <th>预约人数</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <volist name="list" id="vo">
                        <tr>
                            <td>{$vo.title}</td>
                            <td>{$vo.teacher_name}</td>
                            <td>{:date('Y-m-d H:i', $vo['start_time'])}</td>
                            <td>{$vo.duration}分钟</td>
                            <td>{$vo.book_count|default=0}</td>
                            <td><span class="status-tag status-{$vo.status}">{$vo.status_text}</span></td>
                            <td>
                                <a href="{:U('edit', array('id'=>$vo['id']))}">编辑</a>
                                <a href="{:U('booking', array('id'=>$vo['id']))}">预约</a>
                                <if condition="$vo['status'] eq 0">
                                <a href="javascript:;" onclick="del({$vo.id})">删除</a>
                                </if>
                            </td>
                        </tr>
                        </volist>
                    </tbody>
                </table>
                <div class="am-pagination">{$page}</div>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
<script>
function del(id) {
    if(confirm('确定删除此直播课程？')) {
        location.href = '__CONTROLLER__/delete?id=' + id;
    }
}
</script>
</body>
</html>
