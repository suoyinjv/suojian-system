<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- form start -->
		<form class="am-form view-list" action="{{:U('Admin/Growth/Share')}}" method="POST">
			<div class="am-g">
				<input type="text" class="am-radius form-keyword" placeholder="请输入学员姓名或标题搜索" name="keyword" <present name="param['keyword']"> value="{{$param.keyword}}"</present> />
				<button type="submit" class="am-btn am-btn-secondary am-btn-sm am-radius form-submit">查询</button>
				<label class="fs-12 m-l-5 c-p fw-100 more-submit">
					更多筛选
					<input type="checkbox" name="is_more" value="1" id="is_more" <if condition="isset($param['is_more']) and $param['is_more'] == 1">checked</if> />
					<i class="am-icon-angle-down"></i>
				</label>

				<div class="more-where <if condition="!isset($param['is_more']) or $param['is_more'] != 1">none</if>">
					<select name="student_id" class="am-radius c-p m-t-10 m-l-5 param-where">
						<option value="0">选择学员</option>
						<foreach name="student_list" item="v">
							<option value="{{$v.id}}" <if condition="isset($param['student_id']) and $param['student_id'] == $v['id']">selected</if>>{{$v.name}}</option>
						</foreach>
					</select>
					<select name="status" class="am-radius c-p m-t-10 m-l-5 param-where">
						<option value="">状态</option>
						<option value="1" <if condition="isset($param['status']) and $param['status'] == 1">selected</if>>已发布</option>
						<option value="0" <if condition="isset($param['status']) and $param['status'] == 0">selected</if>>待发布</option>
					</select>
					<div class="param-date param-where m-l-5">
						<input type="text" name="time_start" readonly="readonly" class="am-radius m-t-10" placeholder="开始日期" id="time_start" <if condition="isset($param['time_start'])">value="{{$param.time_start}}"</if>/>
						<span>~</span>
						<input type="text" readonly="readonly" class="am-radius m-t-10" placeholder="结束日期" name="time_end" id="time_end" <if condition="isset($param['time_end'])">value="{{$param.time_end}}"</if>/>
					</div>
				</div>
			</div>
        </form>
        <!-- form end -->

        <!-- operation start -->
        <div class="am-g m-t-15">
            <a href="{{:U('Admin/Growth/SaveShare')}}" class="am-btn am-btn-secondary am-radius am-btn-xs am-icon-plus"> 新增分享</a>
        </div>
        <!-- operation end -->

		<!-- list start -->
		<table class="am-table am-table-striped am-table-hover am-text-middle m-t-10 m-l-5">
			<thead>
				<tr>
					<th>ID</th>
					<th>学员姓名</th>
					<th>标题</th>
					<th class="am-hide-sm-only">分享时间</th>
					<th class="am-hide-sm-only">分享链接</th>
					<th>状态</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<if condition="!empty($list)">
					<foreach name="list" item="v">
						<tr id="data-list-{{$v.id}}">
							<td>{{$v.id}}</td>
							<td>{{$v.student_name}}</td>
							<td>{{$v.title}}</td>
							<td class="am-hide-sm-only">{{$v.share_time}}</td>
							<td class="am-hide-sm-only">
								<if condition="!empty($v['share_url'])">
									<a href="{{$v.share_url}}" target="_blank" class="am-text-secondary">{{$v.share_url|msubstr=0,30}}</a>
								<else />
									<span class="am-text-muted">无</span>
								</if>
							</td>
							<td>
								<if condition="$v['status'] == 1">
									<span class="am-badge am-badge-success">已发布</span>
								<else />
									<span class="am-badge am-badge-warning">待发布</span>
								</if>
							</td>
							<td class="view-operation">
								<a href="{{:U('Admin/Growth/ShareDetail', array('id'=>$v['id']))}}">
									<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-file-text-o" data-am-popover="{content: '查看详情', trigger: 'hover focus'}"></button>
								</a>
								<a href="{{:U('Admin/Growth/SaveShare', array('id'=>$v['id']))}}">
									<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-edit" data-am-popover="{content: '编辑', trigger: 'hover focus'}"></button>
								</a>
								<if condition="$v['status'] == 0">
									<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-toggle-off publish-btn" data-url="{{:U('Admin/Growth/PublishShare')}}" data-am-popover="{content: '发布', trigger: 'hover focus'}" data-id="{{$v.id}}"></button>
								<else />
									<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-toggle-on unpublish-btn" data-url="{{:U('Admin/Growth/UnpublishShare')}}" data-am-popover="{content: '取消发布', trigger: 'hover focus'}" data-id="{{$v.id}}"></button>
								</if>
								<button class="am-btn am-btn-default am-btn-xs am-radius am-icon-trash-o submit-delete" data-url="{{:U('Admin/Growth/DeleteShare')}}" data-am-popover="{content: '删除', trigger: 'hover focus'}" data-id="{{$v.id}}"></button>
							</td>
						</tr>
					</foreach>
				<else />
					<tr><td colspan="7" class="table-no">暂无数据</td></tr>
				</if>
			</tbody>
		</table>
		<!-- list end -->

		<!-- page start -->
		<if condition="!empty($list)">
			{{$page_html}}
		</if>
		<!-- page end -->
	</div>
</div>
<!-- right content end  -->
	
<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->
