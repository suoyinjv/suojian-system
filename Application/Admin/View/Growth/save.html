<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>新增成长记录 - SUOJIAN</title>
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="admin-content">
    <div class="am-u-sm-10 am-u-sm-centered">
        <div class="am-panel am-panel-default">
            <div class="am-panel-hd"><i class="am-icon-plus"></i> 新增成长记录</div>
            <div class="am-panel-bd">
                <form class="am-form am-form-horizontal" action="{:U('save')}" method="POST" enctype="multipart/form-data">
                    <div class="am-form-group">
                        <label class="am-u-sm-2">学员 <span class="am-text-danger">*</span></label>
                        <div class="am-u-sm-10">
                            <select name="student_id" class="am-form-field" required>
                                <option value="">选择学员</option>
                                <volist name="studentList" id="vo">
                                <option value="{$vo.id}">{$vo.student_name}（{$vo.phone}）</option>
                                </volist>
                            </select>
                        </div>
                    </div>
                    
                    <div class="am-form-group">
                        <label class="am-u-sm-2">记录类型 <span class="am-text-danger">*</span></label>
                        <div class="am-u-sm-4">
                            <select name="type" class="am-form-field" required>
                                <option value="1">课堂表现</option>
                                <option value="2">作业完成</option>
                                <option value="3">活动参与</option>
                                <option value="4">进步表扬</option>
                                <option value="5">其他</option>
                            </select>
                        </div>
                        <label class="am-u-sm-2">关联课程</label>
                        <div class="am-u-sm-4">
                            <select name="course_id" class="am-form-field">
                                <option value="">无</option>
                                <volist name="courseList" id="vo">
                                <option value="{$vo.id}">{$vo.course_name}</option>
                                </volist>
                            </select>
                        </div>
                    </div>
                    
                    <div class="am-form-group">
                        <label class="am-u-sm-2">标题 <span class="am-text-danger">*</span></label>
                        <div class="am-u-sm-10">
                            <input type="text" name="title" class="am-form-field" placeholder="如：今天表现得很好" required>
                        </div>
                    </div>
                    
                    <div class="am-form-group">
                        <label class="am-u-sm-2">记录内容 <span class="am-text-danger">*</span></label>
                        <div class="am-u-sm-10">
                            <textarea name="content" class="am-form-field" rows="6" placeholder="详细描述..." required></textarea>
                        </div>
                    </div>
                    
                    <div class="am-form-group">
                        <label class="am-u-sm-2">上传图片</label>
                        <div class="am-u-sm-10">
                            <input type="file" name="images[]" multiple accept="image/*" class="am-form-field">
                            <span class="am-form-caret">最多上传9张图片，支持jpg、png格式</span>
                        </div>
                    </div>
                    
                    <div class="am-form-group">
                        <div class="am-u-sm-10 am-u-sm-offset-2">
                            <button type="submit" class="am-btn am-btn-primary">保存</button>
                            <a href="{:U('index')}" class="am-btn am-btn-default">取消</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
</body>
</html>
