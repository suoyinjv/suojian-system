<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- form start -->
		<form class="am-form view-list" action="{{:U('Admin/Checkin/Records')}}" method="POST">
			<div class="am-g">
				<input type="text" class="am-radius form-keyword" placeholder="学员姓名" name="student_name" <present name="param['student_name']"> value="{{$param.student_name}}"</present> />
				<select name="activity_id" class="am-radius c-p m-l-5">
					<option value="">全部活动</option>
					<foreach name="activity_list" item="v">
						<option value="{{$v.id}}" <if condition="isset($param['activity_id']) and $param['activity_id'] == $v['id']">selected</if>>{{$v.name}}</option>
					</foreach>
				</select>
				<select name="status" class="am-radius c-p m-l-5">
					<option value="-1">全部状态</option>
					<option value="0" <if condition="isset($param['status']) and $param['status'] == 0">selected</if>>待审核</option>
					<option value="1" <if condition="isset($param['status']) and $param['status'] == 1">selected</if>>已通过</option>
					<option value="2" <if condition="isset($param['status']) and $param['status'] == 2">selected</if>>已拒绝</option>
				</select>
				<button type="submit" class="am-btn am-btn-secondary am-btn-sm am-radius form-submit">搜索</button>
			</div>
		</form>
		<!-- form end -->

		<!-- batch operation start -->
		<div class="am-g m-t-15">
			<button class="am-btn am-btn-success am-radius am-btn-xs am-icon-check" onclick="batchAudit(1)"> 批量通过</button>
			<button class="am-btn am-btn-danger am-radius am-btn-xs m-l-10 am-icon-times" onclick="batchAudit(2)"> 批量拒绝</button>
		</div>
		<!-- batch operation end -->

		<!-- list start -->
		<table class="am-table am-table-striped am-table-hover am-text-middle m-t-10">
			<thead>
				<tr>
					<th><input type="checkbox" id="select-all" /></th>
					<th>学员</th>
					<th>头像</th>
					<th>活动</th>
					<th>打卡时间</th>
					<th>打卡内容</th>
					<th>状态</th>
					<th>{{:L('common_operation_name')}}</th>
				</tr>
			</thead>
			<tbody>
				<if condition="!empty($list)">
					<foreach name="list" item="v">
						<tr id="data-list-{{$v.id}}">
							<td><input type="checkbox" name="ids[]" value="{{$v.id}}" /></td>
							<td>{{$v.student_name}}</td>
							<td><img src="{{$v.avatar}}" class="am-radius" style="width: 40px; height: 40px; object-fit: cover;" /></td>
							<td>{{$v.activity_name}}</td>
							<td>{{$v.checkin_time}}</td>
							<td>
								<if condition="$v['content_type'] == 'text'">{{$v.content}}
								<elseif condition="$v['content_type'] == 'image'" />
									<img src="{{$v.content}}" class="am-radius" style="max-width: 100px; max-height: 60px;" />
								<elseif condition="$v['content_type'] == 'audio'" />
									<a href="{{$v.content}}" target="_blank" class="am-icon-play-circle"> 播放音频</a>
								<else />
									<span class="am-text-muted">答题</span>
								</if>
							</td>
							<td>
								<if condition="$v['status'] == 0"><span class="am-badge am-badge-warning">待审核</span>
								<elseif condition="$v['status'] == 1" /><span class="am-badge am-badge-success">已通过</span>
								<else /><span class="am-badge am-badge-danger">已拒绝</span>
								</if>
							</td>
							<td class="view-operation">
								<if condition="$v['status'] == 0">
									<button class="am-btn am-btn-xs am-btn-success am-radius am-icon-check" onclick="auditRecord({{$v.id}}, 1)"></button>
									<button class="am-btn am-btn-xs am-btn-danger am-radius am-icon-times" onclick="auditRecord({{$v.id}}, 2)"></button>
								<else />
									<span class="am-text-muted">-</span>
								</if>
							</td>
						</tr>
					</foreach>
				<else />
					<tr><td colspan="8" class="table-no">{{:L('common_not_data_tips')}}</td></tr>
				</if>
			</tbody>
		</table>
		<!-- list end -->

		<!-- page start -->
		<if condition="!empty($list)">
			{{$page_html}}
		</if>
		<!-- page end -->
	</div>
</div>
<!-- right content end  -->

<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->

<script>
$(function(){
	$('#select-all').on('change', function(){
		$('input[name="ids[]"]').prop('checked', $(this).prop('checked'));
	});
});

function auditRecord(id, status){
	$.post("{{:U('Admin/Checkin/AuditRecord')}}", {id: id, status: status}, function(res){
		if(res.code == 1){
			location.reload();
		} else {
			alert(res.msg);
		}
	});
}

function batchAudit(status){
	var ids = [];
	$('input[name="ids[]"]:checked').each(function(){
		ids.push($(this).val());
	});
	if(ids.length == 0){
		alert('请选择要操作的记录');
		return;
	}
	$.post("{{:U('Admin/Checkin/BatchAudit')}}", {ids: ids.join(','), status: status}, function(res){
		if(res.code == 1){
			location.reload();
		} else {
			alert(res.msg);
		}
	});
}
</script>
