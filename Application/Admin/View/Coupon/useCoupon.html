<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>使用优惠券</title>
    <link rel="stylesheet" href="__PUBLIC__/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            <div class="panel panel-success am-margin-top">
                <div class="panel-heading">
                    <h3 class="panel-title"><i class="glyphicon glyphicon-ok-circle"></i> 使用优惠券</h3>
                </div>
                <div class="panel-body">
                    <p class="text-center text-success">
                        <i class="glyphicon glyphicon-check" style="font-size:48px;"></i>
                    </p>
                    <p class="text-center lead">确定要使用该优惠券吗？</p>
                    <p class="text-center text-muted">使用后状态将变更为"已使用"，无法撤销。</p>
                    
                    <div class="text-center am-margin-top">
                        <a href="{:U('doUse', array('id'=>I('id')))}" class="btn btn-success">确认使用</a>
                        <a href="javascript:history.back()" class="btn btn-default">返回</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
