<script>
// 加载课程数据并渲染到日历
$(function() {
    $.ajax({
        url: '<?php echo U('Schedule/getWeekSchedules'); ?>?week_start=' + $('select[name="week_start"]').val(),
        dataType: 'json',
        success: function(res) {
            if (res.data) {
                renderSchedules(res.data);
            }
        }
    });
});

function renderSchedules(schedules) {
