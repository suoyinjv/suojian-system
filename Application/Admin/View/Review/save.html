<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>评价编辑</title>
    <link rel="stylesheet" href="/Public/css/bootstrap.min.css">
    <link rel="stylesheet" href="/Public/css/admin.css">
</head>
<body>
<div class="panel panel-default">
    <div class="panel-heading">
        <h3 class="panel-title">
            <?php echo $info ? '编辑' : '新增'; ?>点评
            <a href="<?php echo U('index'); ?>" class="pull-right" style="font-size:14px;margin-top:2px;">&larr; 返回</a>
        </h3>
    </div>
    <div class="panel-body">
        <form method="post" class="form-horizontal" onsubmit="return submitForm()">
            <input type="hidden" name="id" value="<?php echo $info['id'] ?? 0; ?>">
            
            <div class="form-group">
                <label class="col-sm-2 control-label">学员</label>
                <div class="col-sm-4">
                    <select name="student_id" class="form-control" required>
                        <option value="">请选择学员</option>
                        <?php if (!empty($students)): ?>
                        <?php foreach ($students as $v): ?>
                        <option value="<?php echo $v['id']; ?>" <?php echo ($info['student_id'] ?? 0) == $v['id'] ? 'selected' : ''; ?>><?php echo htmlspecialchars($v['username']); ?></option>
                        <?php endforeach; ?>
                        <?php endif; ?>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label class="col-sm-2 control-label">老师</label>
                <div class="col-sm-4">
                    <select name="teacher_id" class="form-control" required>
                        <option value="">请选择老师</option>
                        <?php if (!empty($teachers)): ?>
                        <?php foreach ($teachers as $v): ?>
                        <option value="<?php echo $v['id']; ?>" <?php echo ($info['teacher_id'] ?? 0) == $v['id'] ? 'selected' : ''; ?>><?php echo htmlspecialchars($v['username']); ?></option>
                        <?php endforeach; ?>
                        <?php endif; ?>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label class="col-sm-2 control-label">评分</label>
                <div class="col-sm-4">
                    <select name="score" class="form-control">
                        <?php for ($i = 5; $i >= 1; $i--): ?>
                        <option value="<?php echo $i; ?>" <?php echo ($info['score'] ?? 5) == $i ? 'selected' : ''; ?>><?php echo $i; ?>星</option>
                        <?php endfor; ?>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label class="col-sm-2 control-label">评价内容</label>
                <div class="col-sm-6">
                    <textarea name="content" class="form-control" rows="4"><?php echo htmlspecialchars($info['content'] ?? ''); ?></textarea>
                </div>
            </div>
            
            <div class="form-group">
                <label class="col-sm-2 control-label">状态</label>
                <div class="col-sm-4">
                    <select name="status" class="form-control">
                        <option value="1" <?php echo ($info['status'] ?? 1) == 1 ? 'selected' : ''; ?>>显示</option>
                        <option value="0" <?php echo ($info['status'] ?? 1) == 0 ? 'selected' : ''; ?>>隐藏</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <div class="col-sm-offset-2 col-sm-10">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <a href="<?php echo U('index'); ?>" class="btn btn-default">取消</a>
                </div>
            </div>
        </form>
    </div>
</div>
<script src="/Public/static/js/jquery-2.0.0.min.js"></script>
<script>
function submitForm() {
    var data = $('form').serialize();
    $.post('', data, function(res) {
        if (res.code == 0) {
            alert(res.msg);
            location.href = '<?php echo U('index'); ?>';
        } else {
            alert(res.msg);
        }
    }, 'json');
    return false;
}
</script>
</body>
</html>
