<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- form start -->
		<form class="am-form form-validation view-save" action="{{:U('Admin/Student/Save')}}" method="POST" request-type="ajax-url" request-value="{{:U('Admin/Student/Index')}}">
			<legend>
				<span class="fs-16">
					<if condition="empty($data['id'])">
						新增学员
					<else />
						编辑学员
					</if>
				</span>
				<a href="{{:U('Admin/Student/Index')}}" class="fr fs-14 m-t-5 am-icon-mail-reply"> {{:L('common_operation_back')}}</a>
			</legend>

			<div class="am-form-group">
				<label>姓名</label>
				<input type="text" name="name" placeholder="姓名" class="am-radius" <notempty name="data"> value="{{$data.name}}"</notempty> required />
			</div>

			<div class="am-form-group">
				<label>性别</label>
				<div>
					<label class="am-radio-inline m-r-10">
						<input type="radio" name="gender" value="1" <if condition="!isset($data['gender']) or $data['gender'] eq 1">checked="checked"</if> data-am-ucheck /> 男
					</label>
					<label class="am-radio-inline m-r-10">
						<input type="radio" name="gender" value="2" <if condition="isset($data['gender']) and $data['gender'] eq 2">checked="checked"</if> data-am-ucheck /> 女
					</label>
				</div>
			</div>

			<div class="am-form-group">
				<label>手机号</label>
				<input type="text" name="mobile" placeholder="手机号" class="am-radius" <notempty name="data"> value="{{$data.mobile}}"</notempty> required />
			</div>

			<div class="am-form-group">
				<label>所属班级</label>
				<select name="class_id" class="am-radius">
					<option value="">请选择班级</option>
					<volist name="class_list" id="v">
						<option value="{{$v.id}}" <if condition="isset($data['class_id']) and $data['class_id'] eq $v['id']">selected</if>>{{$v.name}}</option>
					</volist>
				</select>
			</div>

			<div class="am-form-group">
				<label>家长姓名</label>
				<input type="text" name="parent_name" placeholder="家长姓名" class="am-radius" <notempty name="data"> value="{{$data.parent_name}}"</notempty> />
			</div>

			<div class="am-form-group">
				<label>家长电话</label>
				<input type="text" name="parent_mobile" placeholder="家长电话" class="am-radius" <notempty name="data"> value="{{$data.parent_mobile}}"</notempty> />
			</div>

			<div class="am-form-group">
				<label>备注</label>
				<textarea name="remark" class="am-radius" rows="3"><notempty name="data">{{$data.remark}}</notempty></textarea>
			</div>

			<div class="am-form-group">
				<label>状态</label>
				<div>
					<label class="am-radio-inline m-r-10">
						<input type="radio" name="status" value="1" <if condition="!isset($data['status']) or $data['status'] eq 1">checked="checked"</if> data-am-ucheck /> 正常
					</label>
					<label class="am-radio-inline m-r-10">
						<input type="radio" name="status" value="0" <if condition="isset($data['status']) and $data['status'] eq 0">checked="checked"</if> data-am-ucheck /> 休学
					</label>
				</div>
			</div>

			<div class="am-form-group">
				<input type="hidden" name="id" <notempty name="data"> value="{{$data.id}}"</notempty> />
				<button type="submit" class="am-btn am-btn-primary am-radius btn-loading-example am-btn-sm w100" data-am-loading="{loadingText:'{{:L('common_form_loading_tips')}}'}">{{:L('common_operation_save')}}</button>
			</div>
		</form>
		<!-- form end -->
	</div>
</div>
<!-- right content end  -->

<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->
