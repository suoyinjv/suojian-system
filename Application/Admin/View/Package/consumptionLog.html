<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>课消记录</title>
    <link rel="stylesheet" href="/Public/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="am-cf admin-main">
    <div class="admin-content">
        <div class="am-g am-margin-top">
            <div class="am-u-sm-10 am-u-sm-centered">
                <div class="am-panel am-panel-info">
                    <div class="am-panel-hd">
                        <h3 class="am-panel-title"><i class="am-icon-history"></i> 课消记录</h3>
                    </div>
                    <div class="am-panel-bd">
                        <!-- 课程包信息 -->
                        <div class="am-alert am-alert-secondary">
                            <p><strong>课程包：</strong><?php echo $package['package_name']; ?></p>
                            <p><strong>总课时：</strong><?php echo $package['total_hours']; ?> | <strong>剩余课时：</strong><?php echo $package['remaining_hours']; ?></p>
                            <p><strong>购买时间：</strong>{$package.create_time|date='Y-m-d',###}</p>
                        </div>
                        
                        <!-- 消费记录 -->
                        <table class="am-table am-table-bordered am-table-striped am-margin-top">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>消费时间</th>
                                    <th>消费类型</th>
                                    <th>消耗课时</th>
                                    <th>消费前</th>
                                    <th>消费后</th>
                                    <th>备注</th>
                                </tr>
                            </thead>
                            <tbody>
                                <?php foreach($$logs as $$log): ?>
                                <tr>
                                    <td><?php echo $log['id']; ?></td>
                                    <td>{$log.create_time|date='Y-m-d H:i',###}</td>
                                    <td>
                                        <?php if($log['type'] == 'attendance'): ?>
                                            <span class="am-badge am-badge-primary">考勤扣课</span>
                                        <?php elseif($log['type'] == 'manual'): ?>
                                            <span class="am-badge am-badge-warning">手动扣课</span>
                                        <else/>
                                            <span class="am-badge am-badge-default"><?php echo $log['type']; ?></span>
                                        <?php endif; ?>
                                    </td>
                                    <td><span class="am-text-danger">-<?php echo $log['hours']; ?></span></td>
                                    <td><?php echo $log['before_hours']; ?></td>
                                    <td><?php echo $log['after_hours']; ?></td>
                                    <td>{$log.remark|default='-'}</td>
                                </tr>
                                <?php endforeach; ?>
                                <?php if(!isset($$logs)): ?>
                                <tr><td colspan="7" class="text-center">暂无消费记录</td></tr>
                                <?php endif; ?>
                            </tbody>
                        </table>
                        
                        <div class="am-text-center am-margin-top">
                            <a href="javascript:history.back()" class="am-btn am-btn-default">
                                <i class="am-icon-arrow-left"></i> 返回
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/Public/AmazeUI/js/amazeui.min.js"></script>
</body>
</html>
