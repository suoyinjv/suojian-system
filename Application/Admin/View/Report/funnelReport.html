<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>招生漏斗报表</title>
    <link rel="stylesheet" href="__PUBLIC__/css/bootstrap.min.css">
    <link rel="stylesheet" href="__PUBLIC__/css/admin.css">
    <script src="__PUBLIC__/js/echarts.min.js"></script>
</head>
<body>
<div class="panel panel-default">
    <div class="panel-heading">
        <h3 class="panel-title">招生漏斗报表</h3>
    </div>
    <div class="panel-body">
        <form method="get" class="form-inline">
            <div class="form-group">
                <input type="text" name="start_date" class="form-control datepicker" placeholder="开始日期" value="{$startDate}">
            </div>
            <div class="form-group">
                <input type="text" name="end_date" class="form-control datepicker" placeholder="结束日期" value="{$endDate}">
            </div>
            <div class="form-group">
                <select name="campus_id" class="form-control">
                    <option value="">全部校区</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">查询</button>
            <a href="{:U('exportReport?type=funnel')}" class="btn btn-success">导出Excel</a>
        </form>
        
        <div class="row">
            <div class="col-md-12">
                <div id="funnelChart" style="width: 100%; height: 400px;"></div>
            </div>
        </div>
        
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>阶段</th>
                    <th>数量</th>
                    <th>占比</th>
                </tr>
            </thead>
            <tbody>
                <volist name="data" id="item">
                <tr>
                    <td>{$item.name}</td>
                    <td>{$item.value}</td>
                    <td>{$item.rate}%</td>
                </tr>
                </volist>
            </tbody>
        </table>
    </div>
</div>

<script>
var chart = echarts.init(document.getElementById('funnelChart'));
var option = {
    tooltip: { trigger: 'item' },
    series: [{
        type: 'funnel',
        data: [
            <volist name="data" id="item" separator=",">
            {value: {$item.value}, name: '{$item.name}'}
            </volist>
        ]
    }]
};
chart.setOption(option);
</script>
</body>
</html>
