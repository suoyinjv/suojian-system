<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>添加课后反馈</title>
    <link rel="stylesheet" href="__PUBLIC__/css/bootstrap.min.css">
    <link rel="stylesheet" href="__PUBLIC__/AmazeUI/css/amazeui.min.css">
</head>
<body>
<div class="am-g am-g-fixed am-margin-top">
    <div class="am-panel am-panel-primary">
        <div class="am-panel-hd">
            <h3 class="am-panel-title"><i class="am-icon-edit"></i> 添加课后反馈</h3>
        </div>
        <div class="am-panel-bd">
            <form action="__SELF__" method="POST" class="am-form am-form-horizontal">
                <div class="am-form-group">
                    <label class="am-u-sm-2 am-text-right">班级 <span class="am-text-danger">*</span></label>
                    <div class="am-u-sm-6">
                        <select name="class_id" class="am-form-field" required>
                            <option value="">请选择班级</option>
                            <volist name="classes" id="vo">
                            <option value="{$vo.id}">{$vo.name}</option>
                            </volist>
                        </select>
                    </div>
                </div>
                
                <div class="am-form-group">
                    <label class="am-u-sm-2 am-text-right">授课老师 <span class="am-text-danger">*</span></label>
                    <div class="am-u-sm-6">
                        <select name="teacher_id" class="am-form-field" required>
                            <option value="">请选择老师</option>
                            <volist name="teachers" id="vo">
                            <option value="{$vo.id}">{$vo.name}</option>
                            </volist>
                        </select>
                    </div>
                </div>
                
                <div class="am-form-group">
                    <label class="am-u-sm-2 am-text-right">反馈内容 <span class="am-text-danger">*</span></label>
                    <div class="am-u-sm-8">
                        <textarea name="content" class="am-form-field" rows="8" placeholder="请输入课后反馈内容，包括：&#10;1. 本节课学习内容&#10;2. 学员表现情况&#10;3. 作业布置&#10;4. 其他注意事项" required></textarea>
                    </div>
                </div>
                
                <div class="am-form-group">
                    <label class="am-u-sm-2 am-text-right">附件</label>
                    <div class="am-u-sm-8">
                        <input type="text" name="attachments" class="am-form-field" placeholder="图片或文件URL，多个用逗号分隔">
                        <span class="am-text-sm am-text-muted">可选，支持上传课后照片等</span>
                    </div>
                </div>
                
                <div class="am-form-group">
                    <div class="am-u-sm-offset-2 am-u-sm-8">
                        <div class="am-alert am-alert-warning" data-am-alert>
                            <i class="am-icon-info-circle"></i> 提交后将自动通知该班级所有学员家长
                        </div>
                    </div>
                </div>
                
                <div class="am-form-group">
                    <div class="am-u-sm-offset-2 am-u-sm-6">
                        <button type="submit" class="am-btn am-btn-primary am-btn-block">
                            <i class="am-icon-send"></i> 提交并通知家长
                        </button>
                    </div>
                </div>
                
                <div class="am-form-group">
                    <div class="am-u-sm-offset-2 am-u-sm-6">
                        <a href="{:U('index')}" class="am-btn am-btn-default am-btn-block">返回列表</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="__PUBLIC__/static/js/jquery-2.0.0.min.js"></script>
<script src="__PUBLIC__/AmazeUI/js/amazeui.min.js"></script>
</body>
</html>
