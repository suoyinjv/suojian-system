<include file="Public/Header" />

<!-- right content start  -->
<div class="content-right">
	<div class="content">
		<!-- form start -->
		<form class="am-form form-validation view-save" action="{{:U('Admin/Semester/Save')}}" method="POST" request-type="ajax-url" request-value="{{:U('Admin/Semester/Index')}}">
			<legend>
				<span class="fs-16">
					<if condition="empty($data['id'])">
						新增学期
					<else />
						编辑学期
					</if>
				</span>
				<a href="{{:U('Admin/Semester/Index')}}" class="fr fs-14 m-t-5 am-icon-mail-reply"> {{:L('common_operation_back')}}</a>
			</legend>

			<div class="am-form-group">
				<label>学期名称</label>
				<input type="text" name="name" placeholder="学期名称，如：2024春季" class="am-radius" <notempty name="data"> value="{{$data.name}}"</notempty> required />
			</div>

			<div class="am-form-group">
				<label>开始日期</label>
				<input type="text" name="start_date" class="am-radius" placeholder="开始日期" <notempty name="data"> value="{{$data.start_date}}"</notempty> data-am-datepicker readonly required />
			</div>

			<div class="am-form-group">
				<label>结束日期</label>
				<input type="text" name="end_date" class="am-radius" placeholder="结束日期" <notempty name="data"> value="{{$data.end_date}}"</notempty> data-am-datepicker readonly required />
			</div>

			<div class="am-form-group">
				<label>备注</label>
				<textarea name="remark" class="am-radius" rows="3"><notempty name="data">{{$data.remark}}</notempty></textarea>
			</div>

			<div class="am-form-group">
				<label>状态</label>
				<div>
					<label class="am-radio-inline m-r-10">
						<input type="radio" name="status" value="1" <if condition="!isset($data['status']) or $data['status'] eq 1">checked="checked"</if> data-am-ucheck /> 启用
					</label>
					<label class="am-radio-inline m-r-10">
						<input type="radio" name="status" value="0" <if condition="isset($data['status']) and $data['status'] eq 0">checked="checked"</if> data-am-ucheck /> 禁用
					</label>
				</div>
			</div>

			<div class="am-form-group">
				<input type="hidden" name="id" <notempty name="data"> value="{{$data.id}}"</notempty> />
				<button type="submit" class="am-btn am-btn-primary am-radius btn-loading-example am-btn-sm w100" data-am-loading="{loadingText:'{{:L('common_form_loading_tips')}}'}">{{:L('common_operation_save')}}</button>
			</div>
		</form>
		<!-- form end -->
	</div>
</div>
<!-- right content end  -->

<!-- footer start -->
<include file="Public/Footer" />
<!-- footer end -->
